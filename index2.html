<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Find cheap taxis, motorbikes, car rides, booking and vehicle hire in Luangwa Feira, Zambia on ZamListing.">
  
  <title>ZamListing Rides – Cheapest Taxi, Motorbikes & Cars | Luangwa Feira, Luanshya</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2b6ef6">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary-color: #2563eb;
      --secondary-color: #ff9900;
      --error-color: #dc2626;
      --success-color: #16a34a;
      --bg-color-body: #f5f5f5;
      --bg-color-card: #ffffff;
      --border-color-light: #e0e0e0;
    }
    body { font-family: 'Roboto', Arial, sans-serif; background-color: var(--bg-color-body); color: #333; }

    .corner-logo { width: 32px; height: 32px; object-fit: contain; margin-right: 10px; }
    .company-info { display: flex; align-items: center; gap: 10px; }
    .zam { font-weight: 800; letter-spacing: 0.5px; color: #ffcc00; text-shadow: 1px 2px 4px rgba(0,0,0,0.5); }

    header { background: var(--primary-color); color: white; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.15); }
    .header-content { max-width: 1200px; margin: auto; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; }

    .menu-dropdown-container { position: relative; display: inline-block; }
    .menu-button { background: none; border: none; color: white; cursor: pointer; padding: 5px; font-size: 1.2rem; }
    .menu-dropdown {
      display: none; position: absolute; right: 0; top: 40px; background: white; width: 290px;
      max-height: 85vh; overflow-y: auto; box-shadow: 0 8px 24px rgba(0,0,0,0.25); z-index: 1000;
      border-radius: 12px; padding: 16px; border: 1px solid #e0e0e0;
    }
    .menu-dropdown.show { display: block; }

    .dropdown-content-section { margin-bottom: 20px; }
    .dropdown-content-section h4 { color: #2563eb; border-bottom: 1px solid #f0f0f0; padding-bottom: 6px; margin-bottom: 10px; font-size: 0.95rem; display: flex; align-items: center; gap: 8px; font-weight: 700; }
    .dropdown-content-section a { display: flex; align-items: center; gap: 12px; padding: 10px; text-decoration: none; color: #1f2937; border-radius: 8px; }
    .dropdown-content-section a:hover { background: #f3f4f6; }

    .product-container { max-width: 500px; margin: 15px auto; padding: 0 10px; }
    .booking-container { background: var(--bg-color-card); border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); padding: 15px; }
    fieldset { border: 1px solid var(--border-color-light); border-radius: 10px; padding: 12px; background: #fafafa; margin-bottom: 15px; }
    legend { font-weight: bold; color: var(--primary-color); padding: 0 8px; }
    .input-box { background: white; border: 1.5px solid var(--border-color-light); border-radius: 8px; padding: 10px; display: flex; align-items: center; position: relative; }
    .input-box input { flex: 1; border: none; outline: none; font-size: 1rem; background: transparent; }
    .mode-option { display: flex; align-items: center; gap: 8px; cursor: pointer; }
    .autocomplete-list { position: absolute; top: 100%; left: 0; width: 100%; background: white; border: 1px solid #ddd; z-index: 100; max-height: 150px; overflow-y: auto; border-radius: 0 0 8px 8px; }
    .suggestion { padding: 10px; cursor: pointer; border-bottom: 1px solid #eee; }
    .suggestion:hover { background: #f0f7ff; }
    .summary-card { background: white; border: 1px solid var(--border-color-light); border-radius: 8px; padding: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; }

    .submit-btn { background: var(--primary-color); color: white; width: 65px; height: 65px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; border: none; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
    .btn-loader { width: 45px; height: 45px; border: 4px solid rgba(255,255,255,0.3); border-top: 4px solid #fff; border-radius: 50%; animation: spin 0.8s linear infinite; display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Leaflet Map */
    #leafletMapContainer {
      display: none; margin-top: 12px; border-radius: 12px; overflow: hidden;
      border: 2px solid #333; box-shadow: 0 4px 15px rgba(0,0,0,0.2); position: relative;
    }
    #leafletMap { height: 360px; width: 100%; }
    .map-offline-notice {
      position: absolute; bottom: 10px; left: 10px; background: rgba(0,0,0,0.8);
      color: white; font-size: 0.78rem; padding: 5px 12px; border-radius: 6px; z-index: 1000;
    }
  </style>
</head>
<body>

<header>
  <div class="header-content">
    <div class="company-info">
      <img src="lfr.jpg" alt="Logo" class="corner-logo">
      <h2 class="zam">ZamListing Rides</h2>
    </div>
    <div class="menu-dropdown-container">
      <button class="menu-button" onclick="toggleDropdown()"><i class="fas fa-ellipsis-v"></i></button>
      <div id="header-menu-dropdown" class="menu-dropdown">
        <div class="dropdown-content-section">
          <h4><i class="fas fa-map"></i> Offline Map</h4>
          <p style="font-size:0.85rem;">View locations and hubs for better ride planning.</p>
          <a href="#" onclick="toggleLeafletMap()">
            <i class="fas fa-map-marked-alt"></i> Show / Hide Map
          </a>
          <div id="leafletMapContainer">
            <div id="leafletMap"></div>
            <div class="map-offline-notice" id="offlineNotice">📴 Offline Map Mode</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</header>

<main class="product-container">
  <div class="booking-container">
    <fieldset>
      <legend><span class="material-icons">account_circle</span> Phone Number</legend>
      <div class="input-box">
        <span class="material-icons">phone</span>
        <input type="tel" id="customer-phone" maxlength="10" placeholder="Enter phone eg 0xxxxxxxxx">
      </div>
    </fieldset>

    <div id="trip-details" class="hidden-section">
      <fieldset>
        <legend>Transport Mode</legend>
        <div id="mode-group" style="display:flex; justify-content:space-around; padding:15px 0;">
          <label class="mode-option"><input type="radio" name="mode" value="motorbike"> Motorbike</label>
          <label class="mode-option"><input type="radio" name="mode" value="vehicle"> Car</label>
        </div>
      </fieldset>

      <fieldset>
        <legend>Pickup</legend>
        <div class="input-box" style="position:relative;">
          <input type="text" id="gm-origin" placeholder="Where should we pick you up?">
          <div id="originList" class="autocomplete-list"></div>
        </div>
      </fieldset>

      <fieldset>
        <legend>Destination</legend>
        <div class="input-box" style="position:relative;">
          <input type="text" id="gm-destination" placeholder="Where are you going?">
          <div id="destinationList" class="autocomplete-list"></div>
        </div>
      </fieldset>
    </div>

    <div id="summary-section" class="hidden-section">
      <fieldset>
        <legend>Trip Summary</legend>
        <div id="summary-cards"></div>
      </fieldset>
      <div style="text-align:center; margin-top:20px;">
        <button class="submit-btn" id="submit-btn"><i class="fas fa-paper-plane" id="btn-icon"></i></button>
      </div>
    </div>

    <div class="calc-loader" id="spinner" style="display:none; margin:15px auto;"></div>
    <p id="status" style="text-align:center; margin-top:10px; font-weight:bold;"></p>
  </div>
</main>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
// ====================== YOUR ORIGINAL CALCULATION LOGIC (Fully Preserved) ======================
const config = {
  vehiclePricePerKm: 3.90,
  motorbikePricePerKm: 1.54,
  vehicleMinPrice: 25,
  motorbikeMinPrice: 15,
  vehicleExtra: 6.00,
  motorbikeExtra: 3.00,
  avgSpeed: 60
};

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxpvhvgnjkRcZmuly7uNzPeAC5OwVUq8-qUJ2WXrOqOnSsNgCn0ZHbuz6BGslW83_rB5Q/exec";

// ==================== PASTE ALL YOUR PLACES HERE ====================
const places = [
  "Luangwa Bus Station", "Luangwa Market", "Luangwa Feira Rides", "Katondwe Mission Hospital",
  "Airstrip, Luangwa", "Boma Clinic, Luangwa", "Chitope, Luangwa", "Luanshya Town Roundabout",
  "Downtown Shopping Centre, Luanshya", /* ... Add all your original places here ... */
];

// ==================== PASTE ALL YOUR SEGMENTS HERE ====================
const segments = [ /* Paste all your distance segments here */ ];

// ==================== HUBS (Used in calculation + shown on map) ====================
const hubs = [
  "Luangwa Bus Station",
  "Luangwa Market",
  "Chitope, Luangwa",
  "Luanshya Town Roundabout",
  "Luangwa Feira Rides"
];

// Build graph
const graph = {};
segments.forEach(({ from, to, distance }) => {
  if (!graph[from]) graph[from] = [];
  if (!graph[to]) graph[to] = [];
  graph[from].push({ node: to, distance: parseFloat(distance) });
  graph[to].push({ node: from, distance: parseFloat(distance) });
});

function findShortestDistance(start, end) {
  if (start === end) return 0;
  if (!graph[start] || !graph[end]) return null;

  const distances = {};
  const unvisited = new Set(Object.keys(graph));
  for (const node of unvisited) distances[node] = Infinity;
  distances[start] = 0;

  while (unvisited.size) {
    let current = null;
    for (const node of unvisited) {
      if (current === null || distances[node] < distances[current]) current = node;
    }
    if (current === null || distances[current] === Infinity) break;
    if (current === end) return distances[end];
    unvisited.delete(current);

    for (const neighbor of graph[current]) {
      const newDist = distances[current] + neighbor.distance;
      if (newDist < distances[neighbor.node]) distances[neighbor.node] = newDist;
    }
  }
  return null;
}

function calculateTotalDistance(pickup, destination) {
  if (pickup === destination) return { total: 0, trip: 0, hub: "N/A" };

  let minTotalDistance = Infinity;
  let nearestHub = null;

  for (const hub of hubs) {
    const hubToPickup = findShortestDistance(hub, pickup);
    const tripDistance = findShortestDistance(pickup, destination);
    const destinationToHub = findShortestDistance(destination, hub);

    if (hubToPickup !== null && tripDistance !== null && destinationToHub !== null) {
      const total = hubToPickup + tripDistance + destinationToHub;
      if (total < minTotalDistance) {
        minTotalDistance = total;
        nearestHub = hub;
      }
    }
  }

  const trip = findShortestDistance(pickup, destination);
  return { total: minTotalDistance, trip: trip, hub: nearestHub };
}

// ====================== MAP MARKERS ======================
// Add more places here with real coordinates (get from Google Maps)
const customPlaces = {
  "Luangwa Bus Station": { lat: -15.6167, lng: 30.4167, popup: "Main Hub" },
  "Luangwa Market": { lat: -15.6205, lng: 30.4128, popup: "Market Area" },
  "Luangwa Feira Rides": { lat: -15.6180, lng: 30.4185, popup: "Our Office" },
  "Katondwe Mission Hospital": { lat: -15.5800, lng: 30.4500, popup: "Hospital" },
  "Chitope, Luangwa": { lat: -15.5500, lng: 30.4800, popup: "Chitope" },
  "Luanshya Town Roundabout": { lat: -12.9667, lng: 28.6167, popup: "Luanshya Central" },
  "Airstrip, Luangwa": { lat: -15.6300, lng: 30.4000, popup: "Airstrip" },
  // ====================== ADD NEW PLACES HERE ======================
  // "New Place Name": { lat: -15.XXXXX, lng: 30.XXXXX, popup: "Description" },
};

let mapInitialized = false;
let leafletMap;

function toggleLeafletMap() {
  const container = document.getElementById("leafletMapContainer");
  if (container.style.display === "none" || container.style.display === "") {
    container.style.display = "block";
    if (!mapInitialized) initMap();
    else setTimeout(() => leafletMap.invalidateSize(), 150);
  } else {
    container.style.display = "none";
  }
}

function initMap() {
  leafletMap = L.map('leafletMap').setView([-15.6167, 30.4167], 13);

  // Local tiles (offline) → fallback to online
  L.tileLayer('tiles/{z}/{x}/{y}.png', {
    maxZoom: 18,
    attribution: '© OpenStreetMap',
    errorTileUrl: 'https://via.placeholder.com/256?text=Offline'
  }).addTo(leafletMap).on('tileerror', () => {
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(leafletMap);
  });

  // Add markers for hubs and places
  Object.keys(customPlaces).forEach(name => {
    const p = customPlaces[name];
    L.marker([p.lat, p.lng]).addTo(leafletMap)
      .bindPopup(`<b>\( {name}</b><br> \){p.popup}`);
  });

  mapInitialized = true;
  if (!navigator.onLine) document.getElementById("offlineNotice").style.display = "block";
}

// ====================== UI LOGIC ======================
let rideData = null;

const phoneInput = document.getElementById('customer-phone');
phoneInput.oninput = () => {
  if (/^0[0-9]{9}$/.test(phoneInput.value)) {
    document.getElementById('trip-details').style.display = 'block';
  }
};

function setupAuto(inputId, listId) {
  const input = document.getElementById(inputId);
  const list = document.getElementById(listId);
  input.oninput = () => {
    const val = input.value.toLowerCase();
    list.innerHTML = '';
    places.filter(p => p.toLowerCase().includes(val)).forEach(p => {
      const d = document.createElement('div');
      d.className = 'suggestion';
      d.textContent = p;
      d.onclick = () => {
        input.value = p;
        list.innerHTML = '';
        checkReady();
      };
      list.appendChild(d);
    });
  };
}

function checkReady() {
  const from = document.getElementById('gm-origin').value;
  const to = document.getElementById('gm-destination').value;
  const mode = document.querySelector('input[name="mode"]:checked');
  if (from && to && mode && places.includes(from) && places.includes(to)) {
    calculate(from, to, mode.value);
  }
}

function calculate(from, to, mode) {
  document.getElementById('spinner').style.display = 'block';
  document.getElementById('summary-section').style.display = 'none';

  setTimeout(() => {
    document.getElementById('spinner').style.display = 'none';
    const res = calculateTotalDistance(from, to);

    if (!res.hub) {
      document.getElementById('status').textContent = "Route calculation error.";
      return;
    }

    // Your original pricing logic
    let rate = mode === 'vehicle' ? config.vehiclePricePerKm : config.motorbikePricePerKm;
    let minPrice = mode === 'vehicle' ? config.vehicleMinPrice : config.motorbikeMinPrice;
    let extra = mode === 'vehicle' ? config.vehicleExtra : config.motorbikeExtra;

    let price = Math.max(minPrice, Math.ceil((res.total * rate) + extra));

    document.getElementById('summary-cards').innerHTML = `
      <div class="summary-card"><span>Price</span><span style="color:var(--secondary-color);font-weight:bold;">K${price}</span></div>
      <div class="summary-card"><span>Trip Distance</span><span>${res.trip.toFixed(2)} km</span></div>
    `;

    document.getElementById('summary-section').style.display = 'block';
  }, 600);
}

// Global functions
window.toggleLeafletMap = toggleLeafletMap;
window.toggleDropdown = () => document.getElementById("header-menu-dropdown").classList.toggle("show");

setupAuto('gm-origin', 'originList');
setupAuto('gm-destination', 'destinationList');
document.getElementById('mode-group').addEventListener('change', checkReady);
</script>
</body>
</html>
