<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ZamListing — Products</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <style>
    /* --- Basic page / header --- */
    :root {
      --green: #006400; 
      --black: #000;
      --red: #ff0000;
      --orange: #ff7f00;
      --light-blue: #007bff; 
      --whatsapp-green: #25D366; 
      --dark-green: #004d00;
      --yellow-taxi: #FFD700;
      --eshop-blue: #0056b3;
      --eshop-dark-blue: #003366;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial;
      background: #f4f6f8;
      color: #222;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    header {
      background: var(--eshop-blue);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      position: sticky;
      top: 0;
      z-index: 30;
    }

    .header-content { display: flex; flex-direction: column; gap: 5px; }
    .logo-and-subtitle { display: flex; flex-direction: column; gap: 5px; }
    .logo { font-weight: 700; font-size: 20px; display: flex; gap: 6px; align-items: center; }
    .logo .z { color: var(--green); background:#fff; padding:2px 6px; border-radius:4px; font-weight:800; }
    .logo .a { color: var(--black); }
    .logo .m { color: var(--red); }
    .logo .listing { color: var(--orange); }
    .header-subtitle { font-size: 14px; font-weight: 400; margin: 0; color: rgba(255, 255, 255, 0.85); }
    
    .header-controls { display:flex; align-items:center; gap:16px; position: relative; }

    .cart-icon { cursor: pointer; position: relative; font-size: 20px; user-select: none; }
    .cart-count {
      position: absolute; top: -8px; right: -10px; background: red; color: #fff;
      font-size: 12px; padding: 2px 6px; border-radius: 50%; min-width: 20px; text-align: center;
    }
    
    /* --- Modal CSS --- */
    .modal {
        display: none; position: fixed; z-index: 50; left: 0; top: 0; width: 100%; height: 100%;
        overflow: auto; background-color: rgba(0,0,0,0.75); justify-content: center; align-items: center; padding: 20px;
    }
    .modal.show { display: flex; }
    .modal-content {
        background-color: #fefefe; padding: 20px; border-radius: 10px; max-width: 900px;
        width: 100%; box-shadow: 0 5px 15px rgba(0,0,0,0.3); position: relative; display: flex;
        flex-direction: column; max-height: 90vh;
    }
    .modal-close { color: #aaa; position: absolute; top: 10px; right: 20px; font-size: 30px; font-weight: bold; cursor: pointer; }
    .modal-body { display: flex; gap: 20px; flex-wrap: wrap; overflow-y: auto; padding-top: 20px; }
    .modal-slider-container { position: relative; flex: 1 1 400px; min-height: 250px; overflow: hidden; }
    .modal-slider { position: relative; height: 100%; background: #ddd; }
    .modal-slides { display: flex; transition: transform 0.45s ease; height: 100%; }
    .modal-slides img { width: 100%; object-fit: contain; flex-shrink: 0; height: auto; transition: transform 0.3s ease-in-out; cursor: zoom-in; }
    .modal-slides img.zoomed { transform: scale(1.8); cursor: zoom-out; transform-origin: center center; }
    .modal-slider .prev, .modal-slider .next {
        position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,.45);
        color: #fff; border: 0; padding: 6px 8px; border-radius: 50%; cursor: pointer; z-index: 2;
    }
    .modal-slider .prev{ left:8px } .modal-slider .next{ right:8px }
    .modal-details { flex: 1 1 300px; display: flex; flex-direction: column; }
    .modal-price { color: green; font-weight: 700; font-size: 20px; margin-top: 8px; }
    .modal-controls { display: flex; gap: 10px; margin-top: auto; padding-top: 20px; border-top: 1px solid #eee; flex-wrap: wrap; }
    .modal-controls .btn { flex: 1; font-size: 14px; min-width: 120px; }
    
    /* --- Cart Modal --- */
    #cartModal .modal-content { max-width: 500px; padding: 30px; }
    #cartModal .cart-items { max-height: 300px; overflow-y: auto; padding: 0; margin: 0; list-style: none; }
    #cartModal .cart-items li { display:flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #eee; align-items:center; }
    #cartModal .cart-share { display: flex; gap: 10px; margin-top: 15px; }

    /* --- Buttons with Icons Styling --- */
    .btn { 
      padding: 10px 14px; border-radius: 8px; border: 0; cursor: pointer; font-size: 13px; 
      text-decoration: none; text-align: center; display: inline-flex; align-items: center; 
      justify-content: center; gap: 8px; transition: opacity 0.2s; font-weight: 600;
    }
    .btn:hover { opacity: 0.85; }
    .btn i { font-size: 15px; }
    
    .btn-primary { background: #28a745; color: #fff; } /* Green for Add to Cart */
    .btn-accent { background: #ff9800; color: #fff; }  /* Orange for Offer */
    .btn-call { background: #007bff; color: #fff; }    /* Blue for Call */
    .btn-whatsapp { background: var(--whatsapp-green); color: #fff; }
    .btn-sms { background: var(--light-blue); color: #fff; }

    /* --- Product Cards --- */
    main { flex: 1; padding: 18px; max-width: 1100px; margin: 0 auto; width: 100%; }
    .products { display:grid; grid-template-columns: repeat(auto-fill,minmax(280px,1fr)); gap:18px; }
    .product-card { background:#fff; border-radius:10px; box-shadow: 0 6px 18px rgba(10,10,10,0.06); overflow:hidden; display:flex; flex-direction:column; cursor: pointer; }
    .slider { position:relative; height:180px; overflow:hidden; background:#ddd; }
    .slides { display:flex; transition:transform .45s ease; height:100%; }
    .slides img { width:100%; height:180px; object-fit:contain; flex-shrink:0; cursor: zoom-in; }
    .slider button { position:absolute; top:50%; transform:translateY(-50%); background: rgba(0,0,0,.45); color:#fff; border:0; padding:6px 8px; border-radius:50%; cursor:pointer; }
    .slider .prev{ left:8px } .slider .next{ right:8px }
    .product-details { padding: 12px; }
    .price { color:green; font-weight:700; margin-bottom:6px; }
    .controls { display:flex; flex-wrap: wrap; gap:8px; margin-top:10px; }
    .bid-section { display:none; margin-top:10px; gap:8px; flex-wrap: wrap; }
    .bid-section input { padding:10px; border-radius:8px; border:1px solid #ccc; flex: 1; min-width: 100px; }

    /* --- Filters & Taxi --- */
    .filters-search { padding: 12px 20px; background: #e9ecef; display: flex; flex-direction: column; gap: 12px; border-bottom: 1px solid #dee2e6; }
    .filters { display: flex; gap: 8px; flex-wrap: wrap; }
    .filter-btn { padding: 8px 12px; border-radius: 20px; border: 1px solid #ccc; background: #fff; cursor: pointer; }
    .filter-btn.active { background: var(--green); color: #fff; }
    .search-box input { width: 100%; padding: 10px 15px; border-radius: 20px; border: 1px solid #ccc; }
    
    .taxi-promo { background: linear-gradient(135deg, #4facfe 0%, #1c6ed5 100%); color: #fff; border-radius: 15px; margin: 25px auto; padding: 25px; max-width: 1000px; }
    .taxi-promo a { display: flex; align-items: center; gap: 20px; text-decoration: none; color: inherit; }
    .taxi-image { width: 100px; height: 100px; border-radius: 50%; border: 3px solid gold; overflow: hidden; flex-shrink: 0; }
    .taxi-image img { width: 100%; height: 100%; object-fit: cover; }

    /* --- Footer --- */
    .footer { padding: 20px; text-align: center; background: #f4f6f8; margin-top: 20px; border-top: 1px solid #ddd; }
    .footer-link { margin: 0 10px; text-decoration: none; color: #555; font-weight: bold; }
    .fa-icon-bg { padding: 10px; font-size: 18px; width: 38px; text-decoration: none; margin: 5px; border-radius: 50%; color: white; display: inline-block; }

    @media (max-width:600px) {
      .modal-controls .btn { flex: 1 1 100%; }
      .bid-section input { flex: 1 1 100%; }
    }
  </style>
</head>
<body>

  <header>
    <div class="header-content">
      <div class="logo-and-subtitle">
          <div class="logo">
            <span class="z">Z</span><span class="a">a</span><span class="m">m</span><span class="listing">Listing</span>
          </div>
          <h2 class="header-subtitle">e-Shop Luangwa</h2>
      </div>
    </div>
    <div class="header-controls">
      <div class="cart-icon" id="cart-icon" title="View cart">
        <i class="fa fa-shopping-cart"></i>
        <span class="cart-count" id="cart-count">0</span>
      </div>
    </div>
  </header>

  <div class="filters-search">
    <div class="filters" id="category-filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="electronics">Electronics</button>
      <button class="filter-btn" data-filter="stationary">Stationary</button>
      <button class="filter-btn" data-filter="plumbing">Plumbing</button>
    </div>
    <div class="search-box">
      <input type="text" id="search-input" placeholder="Search for products..." />
    </div>
  </div>
  
  <div class="taxi-promo">
    <a href="https://zamlisting.com/luangwa" target="_blank">
      <div class="taxi-content">
        <h3>Book a Ride 🏍️ 50% Off!</h3>
        <p>Safe and convenient trips within Luangwa.</p>
        <span class="btn" style="background:gold; color:#000;">Book Now</span>
      </div>
      <div class="taxi-image"><img src="lfr.jpg" alt="LFR"></div>
    </a>
  </div>
  
  <main>
    <div class="products" id="product-list">
      <article class="product-card" 
        data-id="p1" data-name="Trekstor Laptop" data-price="1200" 
        data-category="electronics" data-phonenumber="0978167546"
        data-details="11.6-inch 2-in-1 Laptop. Windows 10." data-listed-date="2026-03-13T08:30:00Z">
        <div class="slider">
          <div class="slides"><img src="L1.jpeg" alt="Laptop"></div>
          <button class="prev">&#10094;</button><button class="next">&#10095;</button>
        </div>
        <div class="product-details">
          <h4>Trekstor 11.6" Laptop</h4>
          <div class="price">ZMW 1,200</div>
          <div class="location">Luangwa, Zambia</div>
          <div class="controls">
            <button class="btn btn-primary" onclick="addToCartBtn(this)"><i class="fa fa-cart-plus"></i> Add to Cart</button>
            <a class="btn btn-call" href="tel:0978167546"><i class="fa fa-phone"></i> Call</a>
            <button class="btn btn-accent" onclick="toggleBid(this)"><i class="fa fa-gavel"></i> Offer</button>
          </div>
          <div class="bid-section">
            <input type="number" placeholder="Bid (ZMW)" />
            <button class="btn btn-whatsapp" onclick="submitBid(this, 'whatsapp')"><i class="fa fa-whatsapp"></i> WhatsApp</button>
            <button class="btn btn-sms" onclick="submitBid(this, 'sms')"><i class="fa fa-commenting"></i> SMS</button>
          </div>
        </div>
      </article>

      <article class="product-card" 
        data-id="p2" data-name="Hisense 55" data-price="2300" 
        data-category="electronics" data-phonenumber="0978167546"
        data-details="55 inch Smart TV. 4K UHD." data-listed-date="2026-03-13T08:30:00Z">
        <div class="slider">
          <div class="slides"><img src="Hi1.png" alt="TV"></div>
        </div>
        <div class="product-details">
          <h4>Hisense 55" Smart TV</h4>
          <div class="price">ZMW 2,300</div>
          <div class="location">Luangwa, Zambia</div>
          <div class="controls">
            <button class="btn btn-primary" onclick="addToCartBtn(this)"><i class="fa fa-cart-plus"></i> Add to Cart</button>
            <a class="btn btn-call" href="tel:0978167546"><i class="fa fa-phone"></i> Call</a>
            <button class="btn btn-accent" onclick="toggleBid(this)"><i class="fa fa-gavel"></i> Offer</button>
          </div>
          <div class="bid-section">
            <input type="number" placeholder="Bid (ZMW)" />
            <button class="btn btn-whatsapp" onclick="submitBid(this, 'whatsapp')"><i class="fa fa-whatsapp"></i> WhatsApp</button>
            <button class="btn btn-sms" onclick="submitBid(this, 'sms')"><i class="fa fa-commenting"></i> SMS</button>
          </div>
        </div>
      </article>
    </div>
  </main>

  <div id="productModal" class="modal">
    <div class="modal-content">
      <span class="modal-close">&times;</span>
      <div class="modal-body">
        <div class="modal-slider-container">
          <div class="modal-slider">
            <div class="modal-slides"></div>
            <button class="prev">&#10094;</button><button class="next">&#10095;</button>
          </div>
        </div>
        <div class="modal-details">
          <h4 id="modalProductName"></h4>
          <div class="modal-price" id="modalProductPrice"></div>
          <p id="modalProductDescription" style="margin:15px 0; font-size:14px; color:#555;"></p>
          <div class="modal-controls">
            <button class="btn btn-primary" id="modalAddToCart"><i class="fa fa-cart-plus"></i> Add to Cart</button>
            <a class="btn btn-call" id="modalCallLink" href="#"><i class="fa fa-phone"></i> Call Now</a>
            <button class="btn btn-accent" id="modalMakeOffer"><i class="fa fa-gavel"></i> Make Offer</button>
          </div>
          <div class="bid-section" id="modal-bid-ui" style="margin-top:15px;">
            <input type="number" id="modalBidInput" placeholder="Enter Bid (ZMW)" />
            <div style="display:flex; gap:10px; width:100%;">
                <button class="btn btn-whatsapp" style="flex:1" onclick="submitModalBid('whatsapp')"><i class="fa fa-whatsapp"></i> WhatsApp</button>
                <button class="btn btn-sms" style="flex:1" onclick="submitModalBid('sms')"><i class="fa fa-commenting"></i> SMS</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="cartModal" class="modal">
      <div class="modal-content">
          <span class="modal-close">&times;</span>
          <h3 style="text-align:center;">Your Cart</h3>
          <div class="modal-body">
              <ul class="cart-items" id="cart-items"></ul>
              <div style="display:flex; justify-content:space-between; align-items:center; margin-top:20px;">
                  <strong id="cart-total">Total: ZMK 0</strong>
                  <button class="btn" style="background:#ff4d4f; color:#fff;" id="cart-clear">Clear</button>
              </div>
              <div class="cart-share">
                  <button class="btn btn-whatsapp" style="flex:1" onclick="sendCartViaWhatsApp()"><i class="fa fa-whatsapp"></i> WhatsApp Order</button>
                  <button class="btn btn-sms" style="flex:1" onclick="sendCartViaSMS()"><i class="fa fa-commenting"></i> SMS Order</button>
              </div>
          </div>
      </div>
  </div>

  <footer class="footer">
    <div style="margin-bottom:15px;">
        <a href="#" class="footer-link">Home</a>
        <a href="#" class="footer-link">About</a>
    </div>
    <div>
        <a href="#" class="fa-icon-bg" style="background:#3b5998;"><i class="fa fa-facebook"></i></a>
        <a href="#" class="fa-icon-bg" style="background:#25D366;"><i class="fa fa-whatsapp"></i></a>
        <a href="#" class="fa-icon-bg" style="background:#dd4b39;"><i class="fa fa-envelope"></i></a>
    </div>
    <p style="font-size:12px; color:#888;">&copy; 2026 ZamListing</p>
  </footer>

  <script>
    const FMT = (v) => Number(v).toLocaleString();
    const safeNumber = (str) => Number(String(str).replace(/,/g, '').trim()) || 0;
    const cartPhoneNumber = '0978167546';
    let cart = [];

    // --- Cart Functions ---
    function renderCart() {
      const listEl = document.getElementById('cart-items');
      const totalEl = document.getElementById('cart-total');
      const countEl = document.getElementById('cart-count');
      listEl.innerHTML = cart.length === 0 ? '<li>No items in cart</li>' : '';
      
      cart.forEach(item => {
        const li = document.createElement('li');
        li.innerHTML = `
          <div><strong>${item.name}</strong><br><small>${item.qty} x ZMK ${FMT(item.price)}</small></div>
          <button onclick="removeFromCart('${item.id}')" style="border:0; background:none; color:red; cursor:pointer;">&times;</button>
        `;
        listEl.appendChild(li);
      });

      const total = cart.reduce((s, it) => s + (it.price * it.qty), 0);
      totalEl.textContent = `Total: ZMK ${FMT(total)}`;
      countEl.textContent = cart.reduce((s, it) => s + it.qty, 0);
    }

    function addToCart(id, name, price) {
      const existing = cart.find(i => i.id === id);
      if (existing) existing.qty++;
      else cart.push({ id, name, price, qty: 1 });
      renderCart();
    }

    function removeFromCart(id) {
      cart = cart.filter(i => i.id !== id);
      renderCart();
    }

    // --- Sharing ---
    function getCartMessage() {
      let msg = "Hello, I'd like to order:\n";
      cart.forEach(i => msg += `- ${i.name} (${i.qty}) - ZMK ${FMT(i.price*i.qty)}\n`);
      return msg;
    }

    function sendCartViaWhatsApp() {
      window.location.href = `https://wa.me/260${cartPhoneNumber.substring(1)}?text=${encodeURIComponent(getCartMessage())}`;
    }

    function sendCartViaSMS() {
      window.location.href = `sms:${cartPhoneNumber}?body=${encodeURIComponent(getCartMessage())}`;
    }

    // --- UI Logic ---
    function toggleBid(btn) {
      const sec = btn.closest('.product-details').querySelector('.bid-section');
      sec.style.display = sec.style.display === 'flex' ? 'none' : 'flex';
    }

    function submitBid(btn, type) {
      const card = btn.closest('.product-card');
      const bid = card.querySelector('input').value;
      const phone = card.dataset.phonenumber;
      if(!bid) return alert("Enter amount");
      const msg = `Offer for ${card.dataset.name}: ZMK ${bid}`;
      if(type==='sms') window.location.href = `sms:${phone}?body=${encodeURIComponent(msg)}`;
      else window.location.href = `https://wa.me/260${phone.substring(1)}?text=${encodeURIComponent(msg)}`;
    }

    function addToCartBtn(btn) {
      const card = btn.closest('.product-card');
      addToCart(card.dataset.id, card.dataset.name, safeNumber(card.dataset.price));
      document.getElementById('cartModal').classList.add('show');
    }

    // --- Modal Logic ---
    let currentModalCard = null;
    function showProductModal(card) {
      currentModalCard = card;
      document.getElementById('modalProductName').textContent = card.dataset.name;
      document.getElementById('modalProductPrice').textContent = `ZMW ${FMT(card.dataset.price)}`;
      document.getElementById('modalProductDescription').textContent = card.dataset.details;
      document.getElementById('modalCallLink').href = `tel:${card.dataset.phonenumber}`;
      
      const slides = document.querySelector('#productModal .modal-slides');
      slides.innerHTML = '';
      card.querySelectorAll('.slider img').forEach(img => slides.appendChild(img.cloneNode()));
      
      document.getElementById('productModal').classList.add('show');
    }

    document.getElementById('modalMakeOffer').onclick = () => {
        document.getElementById('modal-bid-ui').style.display = 'block';
    };

    function submitModalBid(type) {
        const bid = document.getElementById('modalBidInput').value;
        if(!bid) return alert("Enter bid");
        const msg = `Offer for ${currentModalCard.dataset.name}: ZMK ${bid}`;
        const phone = currentModalCard.dataset.phonenumber;
        if(type==='sms') window.location.href = `sms:${phone}?body=${encodeURIComponent(msg)}`;
        else window.location.href = `https://wa.me/260${phone.substring(1)}?text=${encodeURIComponent(msg)}`;
    }

    document.getElementById('modalAddToCart').onclick = () => {
        addToCart(currentModalCard.dataset.id, currentModalCard.dataset.name, safeNumber(currentModalCard.dataset.price));
        document.getElementById('productModal').classList.remove('show');
    };

    // Close Modals
    document.querySelectorAll('.modal-close').forEach(c => c.onclick = () => {
        document.querySelectorAll('.modal').forEach(m => m.classList.remove('show'));
    });

    document.getElementById('cart-icon').onclick = () => document.getElementById('cartModal').classList.add('show');
    document.getElementById('cart-clear').onclick = () => { cart = []; renderCart(); };

    // Card click opens modal
    document.querySelectorAll('.product-card').forEach(card => {
        card.onclick = (e) => {
            if(!e.target.closest('button, a, input')) showProductModal(card);
        }
    });

    // Slider Logic
    document.querySelectorAll('.product-card').forEach(card => {
        const slides = card.querySelector('.slides');
        const imgCount = slides.querySelectorAll('img').length;
        let pos = 0;
        card.querySelector('.next').onclick = (e) => { e.stopPropagation(); pos = (pos + 1) % imgCount; slides.style.transform = `translateX(-${pos*100}%)`; };
        card.querySelector('.prev').onclick = (e) => { e.stopPropagation(); pos = (pos - 1 + imgCount) % imgCount; slides.style.transform = `translateX(-${pos*100}%)`; };
    });
  </script>
</body>
</html>
