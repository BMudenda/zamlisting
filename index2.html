<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ZamListing — Products</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <style>
    /* --- Basic page / header --- */
    :root {
      --green: #006400;
      --black: #000;
      --red: #ff0000;
      --orange: #ff7f00;
      --light-blue: #007bff;
      --whatsapp-green: #25D366;
      --dark-green: #004d00;
      --yellow-taxi: #FFD700;
      --eshop-blue: #0056b3;
      --eshop-dark-blue: #003366;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial;
      background: #f4f6f8;
      color: #222;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    header {
      background: var(--eshop-blue);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      position: sticky;
      top: 0;
      z-index: 30;
    }

    .logo {
      font-weight: 700;
      font-size: 20px;
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .logo .z { color: var(--green); background:#fff; padding:2px 6px; border-radius:4px; font-weight:800; }
    .logo .listing { color: var(--orange); }
    .header-subtitle { font-size: 14px; font-weight: 400; margin: 0; color: rgba(255, 255, 255, 0.85); }
    
    .header-controls { display:flex; align-items:center; gap:16px; }
    .cart-icon { cursor: pointer; position: relative; font-size: 20px; }
    .cart-count { position: absolute; top: -8px; right: -10px; background: red; color: #fff; font-size: 12px; padding: 2px 6px; border-radius: 50%; min-width: 20px; text-align: center; }
    
    /* --- Modal CSS --- */
    .modal {
        display: none;
        position: fixed;
        z-index: 50;
        left: 0; top: 0; width: 100%; height: 100%;
        background-color: rgba(0,0,0,0.8);
        justify-content: center;
        align-items: center;
        padding: 20px;
    }
    .modal.show { display: flex; }
    .modal-content {
        background-color: #fff;
        padding: 20px;
        border-radius: 10px;
        max-width: 900px;
        width: 100%;
        position: relative;
        max-height: 90vh;
        overflow-y: auto;
    }
    .modal-close { position: absolute; top: 10px; right: 20px; font-size: 30px; font-weight: bold; cursor: pointer; color: #555; }

    /* --- Filters & Search --- */
    .filters-search { padding: 12px 20px; background: #e9ecef; display: flex; flex-direction: column; gap: 12px; border-bottom: 1px solid #dee2e6; }
    .filters { display: flex; gap: 8px; flex-wrap: wrap; }
    .filter-btn { padding: 8px 12px; border-radius: 20px; border: 1px solid #ccc; background: #fff; cursor: pointer; font-size: 14px; }
    .filter-btn.active { background: var(--green); color: #fff; border-color: var(--green); }
    .search-box input { width: 100%; padding: 8px 12px; border-radius: 20px; border: 1px solid #ccc; }

    /* --- Taxi Promo --- */
    .taxi-promo { background: linear-gradient(135deg, #4facfe 0%, #1c6ed5 100%); color: #fff; border-radius: 15px; margin: 25px auto; padding: 20px; max-width: 1000px; }
    .taxi-promo a { display: flex; align-items: center; gap: 20px; text-decoration: none; color: inherit; }
    .taxi-image { width: 80px; height: 80px; border-radius: 50%; overflow: hidden; border: 3px solid #fff; flex-shrink: 0; }
    .taxi-image img { width: 100%; height: 100%; object-fit: cover; }

    /* --- Products Grid --- */
    main { padding: 18px; max-width: 1100px; margin: 0 auto; width: 100%; }
    .products { display:grid; grid-template-columns: repeat(auto-fill,minmax(280px,1fr)); gap:18px; }
    .product-card { background:#fff; border-radius:10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); overflow:hidden; display:flex; flex-direction:column; transition: transform 0.2s; }
    
    /* --- SLIDER LOGIC --- */
    .slider { position:relative; height:220px; overflow:hidden; background:#eee; }
    .slides { display:flex; height:100%; transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
    .slides img { 
        width:100%; height:100%; object-fit:contain; flex-shrink:0; 
        transition: transform 0.3s ease; cursor: zoom-in; 
    }
    /* ZOOM CLASS */
    .slides img.zoomed {
        transform: scale(1.8);
        cursor: zoom-out;
        z-index: 10;
    }
    
    .slider button { 
        position:absolute; top:50%; transform:translateY(-50%); 
        background: rgba(0,0,0,0.5); color:#fff; border:0; 
        width: 35px; height: 35px; border-radius:50%; cursor:pointer; z-index: 5;
    }
    .slider .prev{ left:10px } .slider .next{ right:10px }
    
    .product-details { padding: 15px; cursor: pointer; }
    .price { color:green; font-weight:700; font-size: 1.1rem; }
    
    .tappable-content { max-height: 0; overflow: hidden; opacity: 0; transition: all 0.4s ease; }
    .product-card.tapped .tappable-content { max-height: 800px; opacity: 1; padding-top: 10px; }

    .btn { padding:10px; border-radius:8px; border:0; cursor:pointer; font-size:13px; font-weight:600; text-decoration:none; display:flex; align-items:center; justify-content:center; gap:5px; }
    .btn-primary { background:#28a745; color:#fff; }
    .btn-accent { background:#ff9800; color:#fff; }
    .btn-call { background: #007bff; color: #fff; }
    
    .bid-section { display:none; margin-top:10px; gap:8px; flex-direction: column; }
    .bid-section input { padding:10px; border-radius:6px; border:1px solid #ccc; width: 100%; }
    
    .footer { padding: 40px 20px; text-align: center; background: #333; color: #fff; margin-top: auto; }
    .fa-footer { font-size: 20px; margin: 0 10px; color: #fff; text-decoration: none; }

    /* Cart Items */
    .cart-items { list-style: none; padding: 0; }
    .cart-items li { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }
  </style>
</head>
<body>

  <header>
    <div>
      <div class="logo">
        <span class="z">Z</span><span>am</span><span class="listing">Listing</span>
      </div>
      <h2 class="header-subtitle">e-Shop Luangwa</h2>
    </div>
    <div class="header-controls">
      <div class="cart-icon" id="cart-icon">
        <i class="fa fa-shopping-cart"></i>
        <span class="cart-count" id="cart-count">0</span>
      </div>
    </div>
  </header>

  <div class="filters-search">
    <div class="filters" id="category-filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="electronics">Electronics</button>
      <button class="filter-btn" data-filter="stationary">Stationary</button>
      <button class="filter-btn" data-filter="amasampo">Amasampo</button>
    </div>
    <div class="search-box">
      <input type="text" id="search-input" placeholder="Search products..." />
    </div>
  </div>

  <main>
    <div class="products" id="product-list">
      
      <article class="product-card" data-id="p1" data-name="Trekstor 2-in-1 Laptop" data-price="1200" data-category="electronics amasampo" data-phonenumber="0978167546" data-details="Trekstor 11.6-inch 2-in-1 Laptop with Intel Celeron N3350, 4GB RAM, 64GB eMMC.">
        <div class="slider">
          <div class="slides">
            <img src="L1.jpeg" alt="Laptop 1">
            <img src="L2.jpeg" alt="Laptop 2">
          </div>
          <button class="prev">&#10094;</button>
          <button class="next">&#10095;</button>
        </div>
        <div class="product-details">
          <h4>Trekstor - 11.6-inch Laptop</h4>
          <div class="price">ZMW 1,200</div>
          <div class="location">Luangwa, Zambia</div>
          <div class="tappable-content">
            <div class="controls" style="display:flex; gap:5px; margin-bottom:10px;">
              <button class="btn btn-primary" onclick="addToCartBtn(this)"><i class="fa fa-cart-plus"></i> Cart</button>
              <a class="btn btn-call" href="tel:0978167546"><i class="fa fa-phone"></i> Call</a>
              <button class="btn btn-accent" onclick="toggleBid(this)"><i class="fa fa-tag"></i> Offer</button>
            </div>
            <div class="bid-section">
              <input type="number" placeholder="Bid (ZMW)" />
              <div style="display:flex; gap:5px;">
                <button class="btn btn-primary" style="background:#25D366; flex:1" onclick="submitBid(this, 'whatsapp')">WhatsApp</button>
                <button class="btn btn-primary" style="background:#007bff; flex:1" onclick="submitBid(this, 'sms')">SMS</button>
              </div>
            </div>
            <p class="desc-text" style="font-size:13px; color:#555;"></p>
          </div>
        </div>
      </article>

      <article class="product-card" data-id="p2" data-name="Hisense 55-inch Smart TV" data-price="2300" data-category="electronics" data-phonenumber="0978167546" data-details="UHD Smart TV 55A6KTUK. Screen needs replacement. Great for parts or repair.">
        <div class="slider">
          <div class="slides">
            <img src="Hi1.png" alt="TV 1">
            <img src="Hi2.png" alt="TV 2">
            <img src="Hi3.png" alt="TV 3">
          </div>
          <button class="prev">&#10094;</button>
          <button class="next">&#10095;</button>
        </div>
        <div class="product-details">
          <h4>Hisense 55" Smart TV</h4>
          <div class="price">ZMW 2,300</div>
          <div class="location">Luangwa, Zambia</div>
          <div class="tappable-content">
            <div class="controls" style="display:flex; gap:5px;">
              <button class="btn btn-primary" onclick="addToCartBtn(this)">+ Cart</button>
              <button class="btn btn-accent" onclick="toggleBid(this)">Offer</button>
            </div>
            <div class="bid-section">
              <input type="number" placeholder="Bid (ZMW)" />
              <button class="btn btn-primary" style="background:#25D366; margin-top:5px" onclick="submitBid(this, 'whatsapp')">WhatsApp Bid</button>
            </div>
            <p class="desc-text" style="font-size:13px; color:#555;"></p>
          </div>
        </div>
      </article>

      </div>
  </main>

  <div id="cartModal" class="modal">
    <div class="modal-content">
      <span class="modal-close" onclick="closeModal('cartModal')">&times;</span>
      <h3>Shopping Cart</h3>
      <ul id="cart-items-list" class="cart-items"></ul>
      <div style="margin-top:20px; font-weight:bold; font-size:1.2rem;" id="cart-total">Total: ZMW 0</div>
      <div style="display:flex; gap:10px; margin-top:20px;">
        <button class="btn btn-primary" style="flex:1; background:#25D366" onclick="sendOrder('whatsapp')">WhatsApp Order</button>
        <button class="btn btn-accent" style="flex:1" onclick="clearCart()">Clear Cart</button>
      </div>
    </div>
  </div>

  <footer class="footer">
    <p>&copy; 2026 ZamListing Luangwa</p>
    <a href="#" class="fa fa-footer fa-facebook"></a>
    <a href="#" class="fa fa-footer fa-whatsapp"></a>
    <a href="mailto:info@zamlisting.com" class="fa fa-footer fa-envelope"></a>
  </footer>

  <script>
    // --- State Management ---
    let cart = [];
    const CART_PHONE = "0978167546";

    // --- Image Slider & Zoom Logic ---
    function initSliders() {
        document.querySelectorAll('.slider').forEach(slider => {
            const slides = slider.querySelector('.slides');
            const images = slides.querySelectorAll('img');
            let index = 0;

            // Nav Buttons
            slider.querySelector('.next').onclick = (e) => {
                e.stopPropagation();
                if (index < images.length - 1) index++;
                else index = 0;
                updateSlider();
            };

            slider.querySelector('.prev').onclick = (e) => {
                e.stopPropagation();
                if (index > 0) index--;
                else index = images.length - 1;
                updateSlider();
            };

            function updateSlider() {
                slides.style.transform = `translateX(-${index * 100}%)`;
                // Remove zoom from all when sliding
                images.forEach(img => img.classList.remove('zoomed'));
            }

            // Zoom Click
            images.forEach(img => {
                img.onclick = (e) => {
                    e.stopPropagation(); // Prevents card from collapsing/expanding
                    img.classList.toggle('zoomed');
                    
                    // Center the zoom based on click position
                    if(img.classList.contains('zoomed')) {
                        const rect = img.getBoundingClientRect();
                        const x = ((e.clientX - rect.left) / rect.width) * 100;
                        const y = ((e.clientY - rect.top) / rect.height) * 100;
                        img.style.transformOrigin = `${x}% ${y}%`;
                    } else {
                        img.style.transformOrigin = 'center center';
                    }
                };
            });
        });
    }

    // --- Cart & Actions ---
    function addToCartBtn(btn) {
        const card = btn.closest('.product-card');
        const item = {
            id: card.dataset.id,
            name: card.dataset.name,
            price: parseInt(card.dataset.price)
        };
        cart.push(item);
        updateCartUI();
        openModal('cartModal');
    }

    function updateCartUI() {
        const list = document.getElementById('cart-items-list');
        const count = document.getElementById('cart-count');
        const totalEl = document.getElementById('cart-total');
        
        list.innerHTML = cart.map((item, idx) => `
            <li>
                <span>${item.name}</span>
                <span>ZMW ${item.price} <i class="fa fa-trash" style="color:red; cursor:pointer" onclick="removeItem(${idx})"></i></span>
            </li>
        `).join('');
        
        const total = cart.reduce((sum, item) => sum + item.price, 0);
        totalEl.innerText = `Total: ZMW ${total}`;
        count.innerText = cart.length;
    }

    function removeItem(idx) {
        cart.splice(idx, 1);
        updateCartUI();
    }

    function clearCart() {
        cart = [];
        updateCartUI();
    }

    function sendOrder(type) {
        if(cart.length === 0) return alert("Cart is empty");
        const summary = cart.map(i => i.name).join(', ');
        const total = cart.reduce((sum, item) => sum + item.price, 0);
        const msg = `Order: ${summary}. Total: ZMW ${total}`;
        
        if(type === 'whatsapp') {
            window.open(`https://wa.me/260${CART_PHONE.substring(1)}?text=${encodeURIComponent(msg)}`);
        }
    }

    // --- UI Helpers ---
    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    function toggleBid(btn) {
        const section = btn.closest('.tappable-content').querySelector('.bid-section');
        section.style.display = section.style.display === 'flex' ? 'none' : 'flex';
    }

    function submitBid(btn, type) {
        const card = btn.closest('.product-card');
        const bid = btn.closest('.bid-section').querySelector('input').value;
        if(!bid) return alert("Enter amount");
        const msg = `Bid for ${card.dataset.name}: ZMW ${bid}`;
        const phone = card.dataset.phonenumber;
        
        if(type === 'whatsapp') window.open(`https://wa.me/260${phone.substring(1)}?text=${encodeURIComponent(msg)}`);
        else window.location.href = `sms:${phone}?body=${encodeURIComponent(msg)}`;
    }

    // Initialize
    window.onload = () => {
        initSliders();
        
        // Card Tap Logic
        document.querySelectorAll('.product-card').forEach(card => {
            // Fill descriptions
            card.querySelector('.desc-text').innerText = card.dataset.details;
            
            // Expand card on click (if not clicking buttons/images)
            card.querySelector('.product-details').onclick = (e) => {
                if(!e.target.closest('button, a, input')) {
                    card.classList.toggle('tapped');
                }
            };
        });

        // Filters
        document.getElementById('category-filters').onclick = (e) => {
            if(!e.target.classList.contains('filter-btn')) return;
            const filter = e.target.dataset.filter;
            
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');

            document.querySelectorAll('.product-card').forEach(card => {
                const cats = card.dataset.category;
                card.style.display = (filter === 'all' || cats.includes(filter)) ? 'flex' : 'none';
            });
        };

        // Search
        document.getElementById('search-input').oninput = (e) => {
            const term = e.target.value.toLowerCase();
            document.querySelectorAll('.product-card').forEach(card => {
                const name = card.dataset.name.toLowerCase();
                card.style.display = name.includes(term) ? 'flex' : 'none';
            });
        };
    };
  </script>
</body>
</html>
