<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ZamListing — Products</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <style>
    :root {
      --green: #006400; --black: #000; --red: #ff0000; --orange: #ff7f00;
      --light-blue: #007bff; --whatsapp-green: #25D366; --eshop-blue: #0056b3;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, sans-serif; background: #f4f6f8; color: #222; }

    header { background: var(--eshop-blue); color: #fff; padding: 12px 20px; position: sticky; top: 0; z-index: 30; display: flex; justify-content: space-between; align-items: center; }
    .logo { font-weight: 700; font-size: 20px; }
    .logo .z { color: var(--green); background:#fff; padding:2px 6px; border-radius:4px; margin-right: 2px; }
    .logo .listing { color: var(--orange); }

    .cart-icon { cursor: pointer; position: relative; font-size: 22px; }
    .cart-count { position: absolute; top: -8px; right: -10px; background: red; color: #fff; font-size: 12px; padding: 2px 6px; border-radius: 50%; }

    /* Filter/Search */
    .filters-search { padding: 15px; background: #fff; border-bottom: 1px solid #ddd; }
    .search-box input { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; margin-top: 10px; }
    .filter-btn { padding: 6px 12px; border-radius: 15px; border: 1px solid #ccc; background: #fff; cursor: pointer; margin-right: 5px; }
    .filter-btn.active { background: var(--green); color: #fff; border-color: var(--green); }

    /* Product Grid */
    main { padding: 15px; max-width: 1100px; margin: 0 auto; }
    .products { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
    
    .product-card { background:#fff; border-radius:12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); overflow:hidden; transition: 0.3s; cursor: pointer; }
    .product-details { padding: 15px; }
    .price { color: green; font-weight: 800; font-size: 1.1em; margin: 5px 0; }
    
    /* Image Slider */
    .slider { position:relative; height:200px; overflow:hidden; background:#eee; }
    .slides { display:flex; transition: transform 0.4s ease-in-out; height:100%; }
    .slides img { width:100%; height:200px; object-fit:cover; flex-shrink:0; transition: transform 0.3s ease; }
    .slides img.zoomed { transform: scale(2.5); z-index: 10; cursor: zoom-out; }
    .slider-nav { position: absolute; top: 50%; width: 100%; display: flex; justify-content: space-between; transform: translateY(-50%); pointer-events: none; }
    .slider-nav button { pointer-events: auto; background: rgba(0,0,0,0.5); color: #fff; border: 0; padding: 10px; cursor: pointer; border-radius: 50%; margin: 0 5px; }

    /* Buttons & Hidden Content */
    .tappable-content { max-height: 0; overflow: hidden; transition: max-height 0.4s ease; }
    .product-card.tapped .tappable-content { max-height: 300px; padding-top: 10px; }
    
    .controls { display: flex; gap: 8px; margin-top: 10px; }
    .btn { padding: 10px; border: 0; border-radius: 6px; cursor: pointer; flex: 1; text-align: center; text-decoration: none; font-weight: 600; font-size: 14px; display: inline-block; }
    .btn-cart { background: #28a745; color: #fff; }
    .btn-offer { background: #ff9800; color: #fff; }
    .btn-call { background: #007bff; color: #fff; }

    /* Bid Input */
    .bid-section { display: none; margin-top: 10px; gap: 5px; }
    .bid-section input { flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }

    /* Modals */
    .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; }
    .modal.show { display: flex; }
    .modal-content { background: #fff; padding: 20px; border-radius: 12px; width: 90%; max-width: 400px; position: relative; }
    .close-modal { position: absolute; right: 15px; top: 10px; font-size: 24px; cursor: pointer; }

    @media (max-width: 600px) { .products { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

  <header>
    <div class="logo"><span class="z">Z</span>am<span class="listing">Listing</span></div>
    <div class="cart-icon" onclick="openCart()">
      <i class="fa fa-shopping-cart"></i>
      <span class="cart-count" id="cart-count">0</span>
    </div>
  </header>

  <div class="filters-search">
    <div id="category-filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="electronics">Electronics</button>
      <button class="filter-btn" data-filter="amasampo">Amasampo</button>
    </div>
    <div class="search-box">
      <input type="text" id="search-input" placeholder="Search product name..." />
    </div>
  </div>

  <main>
    <div class="products" id="product-list">
      
      <article class="product-card" data-id="p1" data-category="electronics amasampo" data-name="Trekstor Laptop" data-price="1200" data-phone="0978167546">
        <div class="slider">
          <div class="slides">
            <img src="L1.jpeg" alt="L1">
            <img src="L2.jpeg" alt="L2">
          </div>
          <div class="slider-nav">
            <button onclick="moveSlide(this, -1)">&#10094;</button>
            <button onclick="moveSlide(this, 1)">&#10095;</button>
          </div>
        </div>
        <div class="product-details">
          <h4>Trekstor 2-in-1 Laptop</h4>
          <div class="price">ZMW 1,200</div>
          <div class="tappable-content">
            <p>11.6" Touchscreen. Very portable.</p>
            <div class="controls">
              <button class="btn btn-cart" onclick="addToCart(this, event)">Add to Cart</button>
              <button class="btn btn-offer" onclick="toggleBid(this, event)">Offer</button>
              <a class="btn btn-call" href="tel:0978167546" onclick="event.stopPropagation()">Call</a>
            </div>
            <div class="bid-section">
              <input type="number" placeholder="Your Price">
              <button class="btn btn-cart" onclick="sendOffer(this, event)">Send</button>
            </div>
          </div>
        </div>
      </article>

      <article class="product-card" data-id="p2" data-category="electronics" data-name="Hisense 55 TV" data-price="2300" data-phone="0978167546">
        <div class="slider">
          <div class="slides">
            <img src="Hi1.png" alt="TV">
          </div>
        </div>
        <div class="product-details">
          <h4>Hisense 55" Smart TV</h4>
          <div class="price">ZMW 2,300</div>
          <div class="tappable-content">
            <p>Needs screen replacement. 4K HDR.</p>
            <div class="controls">
              <button class="btn btn-cart" onclick="addToCart(this, event)">Add to Cart</button>
              <a class="btn btn-call" href="tel:0978167546" onclick="event.stopPropagation()">Call</a>
            </div>
          </div>
        </div>
      </article>

    </div>
  </main>

  <div id="cartModal" class="modal">
    <div class="modal-content">
      <span class="close-modal" onclick="closeCart()">&times;</span>
      <h3>Shopping Cart</h3>
      <div id="cart-items"></div>
      <hr>
      <p><strong>Total: ZMW <span id="cart-total">0</span></strong></p>
      <button class="btn btn-cart" style="width:100%" onclick="checkoutWhatsApp()">Checkout via WhatsApp</button>
    </div>
  </div>

  <script>
    let cart = [];

    // Toggle Card Expansion
    document.querySelectorAll('.product-card').forEach(card => {
      card.addEventListener('click', (e) => {
        if (!e.target.closest('button, a, input, .slider-nav')) {
          card.classList.toggle('tapped');
        }
      });
    });

    // Slider Logic
    function moveSlide(btn, dir) {
      event.stopPropagation();
      const slides = btn.closest('.slider').querySelector('.slides');
      const imgCount = slides.querySelectorAll('img').length;
      let currentIdx = parseInt(slides.dataset.idx || 0);
      currentIdx = (currentIdx + dir + imgCount) % imgCount;
      slides.style.transform = `translateX(-${currentIdx * 100}%)`;
      slides.dataset.idx = currentIdx;
    }

    // Zoom Logic
    document.querySelectorAll('.slides img').forEach(img => {
      img.addEventListener('dblclick', function(e) {
        e.stopPropagation();
        this.classList.toggle('zoomed');
      });
    });

    // Offer / Bid Logic
    function toggleBid(btn, e) {
      e.stopPropagation();
      const section = btn.closest('.product-details').querySelector('.bid-section');
      section.style.display = (section.style.display === 'flex') ? 'none' : 'flex';
    }

    function sendOffer(btn, e) {
      e.stopPropagation();
      const card = btn.closest('.product-card');
      const price = btn.previousElementSibling.value;
      if(!price) return alert("Enter a price");
      const text = `Hi, I want to offer ZMW ${price} for the ${card.dataset.name}`;
      window.open(`https://wa.me/26${card.dataset.phone}?text=${encodeURIComponent(text)}`, '_blank');
    }

    // Cart Logic
    function addToCart(btn, e) {
      e.stopPropagation();
      const card = btn.closest('.product-card');
      const item = { id: card.dataset.id, name: card.dataset.name, price: parseInt(card.dataset.price) };
      cart.push(item);
      updateCartUI();
    }

    function updateCartUI() {
      document.getElementById('cart-count').innerText = cart.length;
      const list = document.getElementById('cart-items');
      let total = 0;
      list.innerHTML = cart.map(i => {
        total += i.price;
        return `<p>${i.name} - ZMW ${i.price}</p>`;
      }).join('');
      document.getElementById('cart-total').innerText = total;
    }

    function openCart() { document.getElementById('cartModal').classList.add('show'); }
    function closeCart() { document.getElementById('cartModal').classList.remove('show'); }

    function checkoutWhatsApp() {
      if(cart.length === 0) return alert("Cart is empty");
      const items = cart.map(i => i.name).join(', ');
      const text = `Order Request: ${items}. Total: ZMW ${document.getElementById('cart-total').innerText}`;
      window.open(`https://wa.me/260978167546?text=${encodeURIComponent(text)}`, '_blank');
    }

    // Search/Filter
    document.getElementById('search-input').oninput = (e) => {
      const q = e.target.value.toLowerCase();
      document.querySelectorAll('.product-card').forEach(c => {
        c.style.display = c.dataset.name.toLowerCase().includes(q) ? 'block' : 'none';
      });
    };

    document.getElementById('category-filters').onclick = (e) => {
      if(!e.target.classList.contains('filter-btn')) return;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
      const f = e.target.dataset.filter;
      document.querySelectorAll('.product-card').forEach(c => {
        c.style.display = (f === 'all' || c.dataset.category.includes(f)) ? 'block' : 'none';
      });
    };
  </script>
</body>
</html>
