<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ZamListing — Products</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <style>
    /* --- Styles (Kept as per your design) --- */
    :root {
      --green: #006400; --black: #000; --red: #ff0000; --orange: #ff7f00;
      --light-blue: #007bff; --whatsapp-green: #25D366; --dark-green: #004d00;
      --yellow-taxi: #FFD700; --eshop-blue: #0056b3; --eshop-dark-blue: #003366;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; background: #f4f6f8; color: #222; }
    header { background: var(--eshop-blue); color: #fff; display: flex; align-items: center; justify-content: space-between; padding: 12px 20px; position: sticky; top: 0; z-index: 30; }
    .logo { font-weight: 700; font-size: 20px; display: flex; gap: 6px; }
    .logo .z { background:#fff; color: var(--green); padding:2px 6px; border-radius:4px; }
    .header-subtitle { font-size: 14px; color: rgba(255, 255, 255, 0.85); margin: 0; }
    .cart-icon { cursor: pointer; position: relative; font-size: 20px; }
    .cart-count { position: absolute; top: -8px; right: -10px; background: red; color: #fff; font-size: 12px; padding: 2px 6px; border-radius: 50%; min-width: 20px; text-align: center; }
    
    /* --- Modals --- */
    .modal { display: none; position: fixed; z-index: 50; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); justify-content: center; align-items: center; padding: 20px; }
    .modal.show { display: flex; }
    .modal-content { background: #fff; padding: 20px; border-radius: 10px; max-width: 800px; width: 100%; position: relative; max-height: 90vh; overflow-y: auto; }
    .modal-close { position: absolute; top: 10px; right: 20px; font-size: 24px; cursor: pointer; font-weight: bold; }
    
    /* --- Product Grid --- */
    main { padding: 18px; max-width: 1100px; margin: 0 auto; }
    .products { display:grid; grid-template-columns: repeat(auto-fill,minmax(280px,1fr)); gap:18px; }
    .product-card { background:#fff; border-radius:10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); overflow:hidden; cursor: pointer; }
    .slider { position:relative; height:200px; overflow:hidden; background:#eee; }
    .slides { display:flex; transition:transform .4s ease; height:100%; }
    .slides img { width:100%; height:100%; object-fit: cover; flex-shrink:0; }
    .slider button { position:absolute; top:50%; transform:translateY(-50%); background:rgba(0,0,0,0.5); color:#fff; border:0; border-radius:50%; cursor:pointer; padding: 5px 10px; }
    .product-details { padding: 15px; }
    .price { color: var(--green); font-weight: bold; font-size: 1.1rem; }
    
    /* --- Buttons --- */
    .btn { padding: 10px 15px; border-radius: 6px; border: 0; cursor: pointer; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; text-decoration: none; justify-content: center; }
    .btn-primary { background: var(--green); color: white; }
    .btn-whatsapp { background: var(--whatsapp-green); color: white; }
    .btn-sms { background: #6c757d; color: white; }
    .btn-call { background: var(--light-blue); color: white; }
    .btn-accent { background: var(--orange); color: white; }
    .controls { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 15px; }
  </style>
</head>
<body>

  <header>
    <div class="logo-and-subtitle">
      <div class="logo"><span class="z">Z</span>amListing</div>
      <h2 class="header-subtitle">e-Shop Luangwa</h2>
    </div>
    <div class="cart-icon" id="cart-icon">
      <i class="fa fa-shopping-cart"></i>
      <span class="cart-count" id="cart-count">0</span>
    </div>
  </header>

  <main>
    <div class="products">
      <article class="product-card" data-id="p1" data-name="Trekstor Laptop" data-price="1200" data-phone="0978167546" data-details="Trekstor 11.6-inch 2-in-1 Laptop with Intel Celeron N3350.">
        <div class="slider">
          <div class="slides"><img src="https://via.placeholder.com/300x200?text=Laptop+1"><img src="https://via.placeholder.com/300x200?text=Laptop+2"></div>
          <button class="prev" onclick="moveSlide(this, -1, event)">&#10094;</button>
          <button class="next" onclick="moveSlide(this, 1, event)">&#10095;</button>
        </div>
        <div class="product-details">
          <h4>Trekstor Laptop</h4>
          <div class="price">ZMW 1,200</div>
          <div class="controls">
            <button class="btn btn-primary" onclick="addToCart(event, 'p1', 'Trekstor Laptop', 1200)"><i class="fa fa-cart-plus"></i> Add</button>
            <a class="btn btn-call" href="tel:0978167546"><i class="fa fa-phone"></i> Call</a>
          </div>
        </div>
      </article>

      <article class="product-card" data-id="p2" data-name="Samsung Galaxy S24" data-price="1000" data-phone="0978167546" data-details="Broken screen-needs replacement.">
        <div class="slider">
          <div class="slides"><img src="https://via.placeholder.com/300x200?text=S24+1"><img src="https://via.placeholder.com/300x200?text=S24+2"></div>
          <button class="prev" onclick="moveSlide(this, -1, event)">&#10094;</button>
          <button class="next" onclick="moveSlide(this, 1, event)">&#10095;</button>
        </div>
        <div class="product-details">
          <h4>Samsung Galaxy S24</h4>
          <div class="price">ZMW 1,000</div>
          <div class="controls">
            <button class="btn btn-primary" onclick="addToCart(event, 'p2', 'Samsung Galaxy S24', 1000)"><i class="fa fa-cart-plus"></i> Add</button>
            <a class="btn btn-call" href="tel:0978167546"><i class="fa fa-phone"></i> Call</a>
          </div>
        </div>
      </article>
    </div>
  </main>

  <div id="cartModal" class="modal">
    <div class="modal-content" style="max-width:450px;">
      <span class="modal-close" onclick="closeModals()">&times;</span>
      <h3><i class="fa fa-shopping-cart"></i> Your Cart</h3>
      <div id="cart-items-list" style="margin: 20px 0;"></div>
      <div style="font-weight: bold; font-size: 1.2rem; border-top: 2px solid #eee; padding-top: 10px; display: flex; justify-content: space-between;">
        <span>Total:</span>
        <span id="cart-total-amount">ZMW 0</span>
      </div>
      <div class="controls" style="margin-top: 20px;">
        <button class="btn btn-whatsapp" style="flex:1" onclick="checkout('whatsapp')">Order via WhatsApp</button>
        <button class="btn btn-sms" onclick="clearCart()">Clear</button>
      </div>
    </div>
  </div>

  <script>
    let cart = [];
    const ADMIN_PHONE = "260978167546";

    // --- Cart Logic ---
    function addToCart(event, id, name, price) {
      if(event) event.stopPropagation(); // Prevents opening product detail modal if clicking button
      
      const existing = cart.find(item => item.id === id);
      if (existing) {
        existing.qty += 1;
      } else {
        cart.push({ id, name, price, qty: 1 });
      }
      
      updateCartUI();
      document.getElementById('cartModal').classList.add('show');
    }

    function updateCartUI() {
      const countEl = document.getElementById('cart-count');
      const listEl = document.getElementById('cart-items-list');
      const totalEl = document.getElementById('cart-total-amount');
      
      let total = 0;
      let count = 0;
      listEl.innerHTML = cart.length === 0 ? '<p>Your cart is empty.</p>' : '';

      cart.forEach((item, index) => {
        total += item.price * item.qty;
        count += item.qty;
        listEl.innerHTML += `
          <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
            <span>${item.name} (x${item.qty})</span>
            <span>ZMW ${item.price * item.qty}</span>
          </div>`;
      });

      countEl.textContent = count;
      totalEl.textContent = `ZMW ${total.toLocaleString()}`;
    }

    function clearCart() {
      cart = [];
      updateCartUI();
      closeModals();
    }

    // --- Checkout Logic ---
    function checkout(type) {
      if (cart.length === 0) return alert("Cart is empty");

      let message = "*New Order from ZamListing*\n------------------\n";
      let total = 0;
      cart.forEach(item => {
        message += `• ${item.name} (x${item.qty}) - ZMW ${item.price * item.qty}\n`;
        total += item.price * item.qty;
      });
      message += `------------------\n*Total: ZMW ${total}*`;

      if (type === 'whatsapp') {
        window.open(`https://wa.me/${ADMIN_PHONE}?text=${encodeURIComponent(message)}`, '_blank');
      }
    }

    // --- UI Helpers ---
    function closeModals() {
      document.querySelectorAll('.modal').forEach(m => m.classList.remove('show'));
    }

    function moveSlide(btn, direction, event) {
      event.stopPropagation();
      const slides = btn.parentElement.querySelector('.slides');
      const totalSlides = slides.children.length;
      let current = Math.abs(parseInt(slides.style.transform.replace(/[^\d-]/g, '')) || 0) / 100;
      
      current = (current + direction + totalSlides) % totalSlides;
      slides.style.transform = `translateX(-${current * 100}%)`;
    }

    document.getElementById('cart-icon').onclick = () => {
      document.getElementById('cartModal').classList.add('show');
    };

    // Close on outside click
    window.onclick = (event) => {
      if (event.target.classList.contains('modal')) closeModals();
    };
  </script>
</body>
</html>
