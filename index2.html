<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZamListing Rides – Luangwa Feira</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Roboto', sans-serif; background: #f5f5f5; color: #333; }
    
    header { background: #2563eb; color: white; position: sticky; top: 0; z-index: 100; padding: 12px 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
    .header-content { max-width: 500px; margin: auto; display: flex; justify-content: space-between; align-items: center; }

    .booking-container { max-width: 500px; margin: 15px auto; background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); padding: 20px; }
    fieldset { border: 1px solid #ddd; border-radius: 10px; padding: 12px; margin-bottom: 16px; background: #fafafa; }
    legend { font-weight: bold; color: #2563eb; }

    .input-box { display: flex; align-items: center; background: white; border: 1.5px solid #ccc; border-radius: 8px; padding: 10px; position: relative; }
    .input-box input { flex: 1; border: none; outline: none; font-size: 1rem; }

    .autocomplete-list { position: absolute; top: 100%; left: 0; width: 100%; background: white; border: 1px solid #ccc; max-height: 200px; overflow-y: auto; z-index: 100; border-radius: 0 0 8px 8px; }
    .suggestion { padding: 10px; cursor: pointer; }
    .suggestion:hover { background: #e3f2fd; }

    .summary-card { background: #f8f9fa; padding: 12px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; }

    .submit-btn {
      background: #2563eb; color: white; width: 70px; height: 70px; border-radius: 50%;
      font-size: 28px; border: none; display: block; margin: 20px auto; cursor: pointer; position: relative;
    }
    .btn-loader {
      width: 45px; height: 45px; border: 4px solid rgba(255,255,255,0.3);
      border-top: 4px solid white; border-radius: 50%; animation: spin 0.8s linear infinite;
      position: absolute; display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #leafletMapContainer { display: none; margin: 15px auto; max-width: 500px; border-radius: 12px; overflow: hidden; border: 2px solid #333; }
    #leafletMap { height: 380px; width: 100%; }
  </style>
</head>
<body>

<header>
  <div class="header-content">
    <div style="display:flex; align-items:center; gap:8px;">
      <img src="lfr.jpg" width="36" height="36" alt="Logo">
      <h2>ZamListing Rides</h2>
    </div>
    <button onclick="toggleDropdown()" style="background:none;border:none;color:white;font-size:1.6rem;cursor:pointer;">
      <i class="fas fa-ellipsis-v"></i>
    </button>
  </div>
</header>

<div class="booking-container">
  <fieldset>
    <legend>Phone Number</legend>
    <div class="input-box">
      <span class="material-icons">phone</span>
      <input type="tel" id="customer-phone" maxlength="10" placeholder="0xxxxxxxxx">
    </div>
  </fieldset>

  <div id="trip-details" style="display:none;">
    <fieldset>
      <legend>Transport Mode</legend>
      <div style="display:flex; justify-content:center; gap:50px; padding:10px;">
        <label><input type="radio" name="mode" value="motorbike"> Motorbike</label>
        <label><input type="radio" name="mode" value="vehicle"> Car</label>
      </div>
    </fieldset>

    <fieldset>
      <legend>Pickup</legend>
      <div class="input-box" style="position:relative;">
        <input type="text" id="gm-origin" placeholder="Pickup location">
        <div id="originList" class="autocomplete-list"></div>
      </div>
    </fieldset>

    <fieldset>
      <legend>Destination</legend>
      <div class="input-box" style="position:relative;">
        <input type="text" id="gm-destination" placeholder="Destination">
        <div id="destinationList" class="autocomplete-list"></div>
      </div>
    </fieldset>
  </div>

  <div id="summary-section" style="display:none;">
    <fieldset>
      <legend>Trip Summary</legend>
      <div id="summary-cards"></div>
    </fieldset>
    <button class="submit-btn" id="submit-btn">
      <i class="fas fa-paper-plane" id="btn-icon"></i>
      <div class="btn-loader" id="btn-loader"></div>
    </button>
  </div>

  <p id="status" style="text-align:center; font-weight:bold; margin-top:10px;"></p>
</div>

<!-- Map -->
<div style="max-width:500px; margin:10px auto; padding:0 12px;">
  <button onclick="toggleLeafletMap()" style="width:100%; padding:12px; background:white; border:1px solid #ccc; border-radius:8px;">
    <i class="fas fa-map"></i> Show / Hide Offline Map
  </button>
  <div id="leafletMapContainer">
    <div id="leafletMap"></div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ==================== UPDATE COORDINATES HERE ====================
const placeData = {
  "Luangwa Bus Station": { lat: -15.6167, lng: 30.4167 },
  "Luangwa Market": { lat: -15.6205, lng: 30.4128 },
  "Luangwa Feira Rides": { lat: -15.6180, lng: 30.4185 },
  "Katondwe Mission Hospital": { lat: -15.5800, lng: 30.4500 },
  "Airstrip, Luangwa": { lat: -15.6300, lng: 30.4000 }
  // ADD MORE PLACES BELOW:
  // "Your Place Name": { lat: -15.XXXXX, lng: 30.XXXXX },
};

const places = Object.keys(placeData);

// Rest of calculation logic (unchanged)
const config = {
  vehiclePricePerKm: 3.90, motorbikePricePerKm: 1.54,
  vehicleMinPrice: 25, motorbikeMinPrice: 15,
  vehicleExtra: 6.00, motorbikeExtra: 3.00
};

const segments = [ 
  { from: "Luangwa Bus Station", to: "Luangwa Market", distance: 1.5 },
  { from: "Luangwa Bus Station", to: "Luangwa Feira Rides", distance: 2.8 },
  { from: "Luangwa Bus Station", to: "Katondwe Mission Hospital", distance: 48 }
  // Paste your full segments here
];

const hubs = ["Luangwa Bus Station", "Luangwa Market"];

const graph = {};
segments.forEach(s => {
  if (!graph[s.from]) graph[s.from] = [];
  if (!graph[s.to]) graph[s.to] = [];
  const d = parseFloat(s.distance);
  graph[s.from].push({node: s.to, distance: d});
  graph[s.to].push({node: s.from, distance: d});
});

function findShortestDistance(start, end) {
  if (start === end) return 0;
  if (!graph[start] || !graph[end]) return null;

  const distances = Object.keys(graph).reduce((a,k)=>{a[k]=Infinity;return a;},{});
  distances[start] = 0;
  const unvisited = new Set(Object.keys(graph));

  while (unvisited.size) {
    let curr = [...unvisited].reduce((a,b) => distances[a] < distances[b] ? a : b);
    if (distances[curr] === Infinity) break;
    if (curr === end) return distances[end];
    unvisited.delete(curr);
    (graph[curr]||[]).forEach(n => {
      const alt = distances[curr] + n.distance;
      if (alt < distances[n.node]) distances[n.node] = alt;
    });
  }
  return null;
}

function calculateTotalDistance(pickup, destination) {
  let minTotal = Infinity, tripDist = null;
  for (let hub of hubs) {
    const d1 = findShortestDistance(hub, pickup);
    const trip = findShortestDistance(pickup, destination);
    const d2 = findShortestDistance(destination, hub);
    if (d1 !== null && trip !== null && d2 !== null) {
      const total = d1 + trip + d2;
      if (total < minTotal) {
        minTotal = total;
        tripDist = trip;
      }
    }
  }
  return { total: minTotal, trip: tripDist };
}

// Map
let leafletMap = null;

function toggleLeafletMap() {
  const container = document.getElementById("leafletMapContainer");
  container.style.display = container.style.display === "block" ? "none" : "block";

  if (container.style.display === "block" && !leafletMap) {
    leafletMap = L.map('leafletMap').setView([-15.6167, 30.4167], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(leafletMap);
  }
  if (leafletMap) setTimeout(() => leafletMap.invalidateSize(), 300);
}

function updateMap() {
  if (!leafletMap) return;

  leafletMap.eachLayer(layer => {
    if (layer instanceof L.Marker || layer instanceof L.Polyline) leafletMap.removeLayer(layer);
  });

  const pickupName = document.getElementById('gm-origin').value.trim();
  const destName = document.getElementById('gm-destination').value.trim();

  let pPos = null, dPos = null;

  if (pickupName && placeData[pickupName]) {
    pPos = [placeData[pickupName].lat, placeData[pickupName].lng];
    L.marker(pPos).addTo(leafletMap).bindPopup(`<b>Pickup:</b><br>${pickupName}`);
  }
  if (destName && placeData[destName]) {
    dPos = [placeData[destName].lat, placeData[destName].lng];
    L.marker(dPos).addTo(leafletMap).bindPopup(`<b>Destination:</b><br>${destName}`);
  }

  if (pPos && dPos) {
    L.polyline([pPos, dPos], { color: '#2563eb', weight: 6, opacity: 0.9 }).addTo(leafletMap);
    leafletMap.fitBounds([pPos, dPos], { padding: [70, 70] });
  }
}

// Autocomplete, Calculation, etc. (same as before)
function setupAuto(inputId, listId) {
  const input = document.getElementById(inputId);
  const list = document.getElementById(listId);
  input.oninput = () => {
    list.innerHTML = '';
    const val = input.value.toLowerCase();
    if (!val) return;
    places.filter(p => p.toLowerCase().includes(val)).forEach(p => {
      const div = document.createElement('div');
      div.className = 'suggestion';
      div.textContent = p;
      div.onclick = () => {
        input.value = p;
        list.innerHTML = '';
        checkReady();
        updateMap();
      };
      list.appendChild(div);
    });
  };
}

function checkReady() {
  const from = document.getElementById('gm-origin').value;
  const to = document.getElementById('gm-destination').value;
  const mode = document.querySelector('input[name="mode"]:checked');
  if (from && to && mode) calculate(from, to, mode.value);
}

function calculate(from, to, mode) {
  const res = calculateTotalDistance(from, to);
  if (res.total === Infinity) {
    document.getElementById('status').textContent = "Route not found";
    return;
  }

  const isVehicle = mode === 'vehicle';
  const rate = isVehicle ? config.vehiclePricePerKm : config.motorbikePricePerKm;
  const minP = isVehicle ? config.vehicleMinPrice : config.motorbikeMinPrice;
  const extra = isVehicle ? config.vehicleExtra : config.motorbikeExtra;
  const price = Math.max(minP, Math.ceil(res.total * rate + extra));

  document.getElementById('summary-cards').innerHTML = `
    <div class="summary-card"><strong>Price:</strong> <span style="color:#ff9900">K${price}</span></div>
    <div class="summary-card"><strong>Distance:</strong> ${res.trip ? res.trip.toFixed(2) : 'N/A'} km</div>
  `;
  document.getElementById('summary-section').style.display = 'block';
}

// Submit Loader
document.getElementById('submit-btn').addEventListener('click', function() {
  const btn = this;
  const icon = document.getElementById('btn-icon');
  const loader = document.getElementById('btn-loader');
  const status = document.getElementById('status');

  icon.style.display = 'none';
  loader.style.display = 'block';
  btn.disabled = true;
  status.textContent = "Submitting...";

  setTimeout(() => {
    status.innerHTML = `<span style="color:green">✓ Request Sent Successfully!</span>`;
    loader.style.display = 'none';
    icon.style.display = 'block';
    btn.disabled = false;
  }, 2000);
});

// Initialize
setupAuto('gm-origin', 'originList');
setupAuto('gm-destination', 'destinationList');

document.getElementById('customer-phone').addEventListener('input', function() {
  if (this.value.length >= 9) document.getElementById('trip-details').style.display = 'block';
});

document.querySelectorAll('input[name="mode"]').forEach(r => r.addEventListener('change', checkReady));

document.getElementById('gm-origin').addEventListener('change', updateMap);
document.getElementById('gm-destination').addEventListener('change', updateMap);

function toggleDropdown() { alert("Menu"); }
</script>
</body>
</html>
