<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yango Booking App</title>
    <!-- Include Bootstrap for styling -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        #map {
            height: 400px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-center">Yango Booking App</h1>
        <!-- Booking Form -->
        <form id="bookingForm">
            <div class="mb-3">
                <label for="name" class="form-label">Name</label>
                <input type="text" class="form-control" id="name" placeholder="Enter your name" required>
            </div>
            <div class="mb-3">
                <label for="pickupLocation" class="form-label">Pickup Location</label>
                <input type="text" class="form-control" id="pickupLocation" placeholder="Enter pickup location" required>
            </div>
            <div class="mb-3">
                <label for="destination" class="form-label">Destination</label>
                <input type="text" class="form-control" id="destination" placeholder="Enter destination" required>
            </div>
            <button type="submit" class="btn btn-primary">Submit</button>
        </form>
        <!-- Map -->
        <div id="map"></div>
    </div>

    <!-- Include Google Maps API -->
    <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_GOOGLE_MAPS_API_KEY&callback=initMap" async defer></script>
    <script>
        // Initialize Google Map
        let map;
        function initMap() {
            map = new google.maps.Map(document.getElementById("map"), {
                center: { lat: -1.286389, lng: 36.817223 }, // Example: Nairobi, Kenya
                zoom: 12,
            });
        }

        // Handle form submission
        document.getElementById("bookingForm").addEventListener("submit", async function (e) {
            e.preventDefault();

            const name = document.getElementById("name").value;
            const pickupLocation = document.getElementById("pickupLocation").value;
            const destination = document.getElementById("destination").value;

            // Data to be sent to Google Sheets
            const formData = { name, pickupLocation, destination };

            // Send data to Google Sheets via API
            try {
                const response = await fetch("YOUR_GOOGLE_SHEETS_API_ENDPOINT", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(formData),
                });

                if (response.ok) {
                    alert("Booking submitted successfully!");
                } else {
                    alert("Failed to submit booking.");
                }
            } catch (error) {
                console.error("Error submitting booking:", error);
                alert("An error occurred.");
            }
        });
    </script>
</body>
</html>
