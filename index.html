
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Under Construction</title>
  <style>
    /* --- Reset and basic styling --- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Arial', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #007bff, #00c6ff);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fff;
      text-align: center;
    }

    .construction-container {
      background: rgba(0, 0, 0, 0.5);
      padding: 40px 30px;
      border-radius: 15px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
      max-width: 500px;
      width: 90%;
    }

    .construction-container h1 {
      font-size: 2.5rem;
      margin-bottom: 20px;
      color: #ffd700;
    }

    .construction-container p {
      font-size: 1.2rem;
      margin-bottom: 25px;
    }

    .construction-container img {
      width: 120px;
      margin-bottom: 25px;
    }

    .construction-container a {
      display: inline-block;
      padding: 10px 20px;
      background: #ffd700;
      color: #000;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
      transition: 0.3s;
    }

    .construction-container a:hover {
      background: #ffc107;
      color: #000;
    }
  </style>
</head>
<body>
  <div class="construction-container">
    <img src="https://img.icons8.com/emoji/96/000000/construction-emoji.png" alt="Under Construction">
    <h1>Page Under Construction</h1>
    <p>We're working hard to bring you this page. Please check back soon!</p>
    <a href="index.html">Go Back Home</a>
  </div>
</body>
</html>
