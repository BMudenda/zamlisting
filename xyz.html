<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mini Video Editor</title>

<script src="https://unpkg.com/@ffmpeg/ffmpeg@0.12.6/dist/ffmpeg.min.js"></script>

<style>
body{
font-family:Arial;
background:#111;
color:#fff;
text-align:center;
padding:20px;
}

video{
width:90%;
max-width:700px;
margin:10px 0;
border-radius:10px;
}

button{
padding:10px 20px;
margin:5px;
background:#00c853;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

input{
padding:8px;
margin:5px;
width:100px;
}
</style>
</head>
<body>

<h2>HTML Video Editor</h2>

<input type="file" id="videoInput" accept="video/*">

<br>

<video id="video" controls></video>

<br>

Start:
<input type="number" id="start" value="0">

End:
<input type="number" id="end" value="10">

<br>

<select id="resolution">
<option value="640:360">360p</option>
<option value="1280:720">720p</option>
<option value="1920:1080">1080p</option>
</select>

<br>

<button onclick="trimVideo()">Trim & Resize</button>

<a id="downloadLink"></a>

<script>

const { FFmpeg } = FFmpegWASM;
const ffmpeg = new FFmpeg();

let uploadedFile;

document.getElementById("videoInput").addEventListener("change", e=>{
uploadedFile = e.target.files[0];

const url = URL.createObjectURL(uploadedFile);
document.getElementById("video").src = url;
});

async function trimVideo(){

if(!uploadedFile){
alert("Select a video");
return;
}

await ffmpeg.load();

const start = document.getElementById("start").value;
const end = document.getElementById("end").value;
const size = document.getElementById("resolution").value;

await ffmpeg.writeFile(
"input.mp4",
new Uint8Array(await uploadedFile.arrayBuffer())
);

await ffmpeg.exec([
"-i","input.mp4",
"-ss",start,
"-to",end,
"-vf",`scale=${size}`,
"output.mp4"
]);

const data = await ffmpeg.readFile("output.mp4");

const blob = new Blob(
[data.buffer],
{type:"video/mp4"}
);

const url = URL.createObjectURL(blob);

const link = document.getElementById("downloadLink");
link.href = url;
link.download = "edited-video.mp4";
link.innerHTML = "⬇ Download Edited Video";
}

</script>

</body>
</html>
