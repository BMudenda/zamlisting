<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>CashFlow Pro | Complete Cumulative Tracker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0f172a;
            color: #f8fafc;
            min-height: 100vh;
            padding: 24px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        .header {
            background: #1e293b;
            border-radius: 16px;
            padding: 24px 32px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            border: 1px solid #334155;
        }

        .logo h1 {
            font-size: 1.8rem;
            color: #38bdf8;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo p {
            color: #94a3b8;
            font-size: 0.85rem;
            margin-top: 4px;
        }

        .btn-add {
            background: linear-gradient(135deg, #10b981, #059669);
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: #1e293b;
            border-radius: 16px;
            padding: 24px;
            border: 1px solid #334155;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .stat-icon {
            width: 56px;
            height: 56px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            flex-shrink: 0;
        }

        .stat-content {
            flex-grow: 1;
        }

        .stat-card h3 {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: #94a3b8;
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 1.75rem;
            font-weight: 700;
            color: #f8fafc;
        }

        .action-bar {
            background: #1e293b;
            border-radius: 16px;
            padding: 16px 24px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            border: 1px solid #334155;
        }

        .btn-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
        }

        .btn-refresh { background: #6366f1; color: white; }
        .btn-whatsapp { background: #22c55e; color: white; }
        .btn-sms { background: #0ea5e9; color: white; }
        .btn-email { background: #ef4444; color: white; }

        .table-wrapper {
            background: #1e293b;
            border-radius: 16px;
            overflow-x: auto;
            border: 1px solid #334155;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
            text-align: left;
        }

        th {
            background: #1e293b;
            padding: 16px;
            font-weight: 600;
            color: #94a3b8;
            border-bottom: 2px solid #334155;
        }

        td {
            padding: 14px 16px;
            border-bottom: 1px solid #334155;
            color: #e2e8f0;
        }

        tr:hover {
            background: #25334d;
            cursor: pointer;
        }

        .val-positive { color: #4ade80; font-weight: 600; }
        .val-negative { color: #f87171; font-weight: 600; }
        .val-neutral { color: #fbbf24; font-weight: 600; }

        .overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(4px);
            z-index: 999;
            display: none;
        }

        .modal {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: #1e293b;
            border-radius: 16px;
            width: 90%;
            max-width: 500px;
            z-index: 1000;
            display: none;
            border: 1px solid #475569;
        }

        .modal.show, .overlay.show { display: block; }

        .modal-header {
            padding: 20px 24px;
            border-bottom: 1px solid #334155;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .close-modal {
            background: none;
            border: none;
            color: #94a3b8;
            cursor: pointer;
            font-size: 1.2rem;
        }

        .modal-body { padding: 24px; }

        .form-group { margin-bottom: 16px; }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            color: #94a3b8;
            font-size: 0.85rem;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 10px 14px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            color: white;
            font-size: 0.9rem;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .modal-footer {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        .btn-save {
            flex: 1;
            background: #10b981;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-cancel {
            flex: 1;
            background: #334155;
            color: #e2e8f0;
            border: none;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
        }

        .toast {
            position: fixed;
            bottom: 24px; right: 24px;
            padding: 12px 24px;
            border-radius: 8px;
            z-index: 1100;
            font-weight: 600;
        }

        @media (max-width: 768px) {
            .stats-grid { grid-template-columns: 1fr; }
            .form-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">
            <h1><i class="fas fa-wallet"></i> CashFlow Pro</h1>
            <p>Complete Cumulative Cash Management System</p>
        </div>
        <button class="btn-add" id="openModalBtn"><i class="fas fa-plus"></i> Add Transaction</button>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-icon" style="background: #10b98120; color: #10b981;"><i class="fas fa-arrow-down"></i></div>
            <div class="stat-content">
                <h3>Total Cash In</h3>
                <div class="stat-value" id="totalCashIn">K0.00</div>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon" style="background: #38bdf820; color: #38bdf8;"><i class="fas fa-crosshairs"></i></div>
            <div class="stat-content">
                <h3>Total Target</h3>
                <div class="stat-value" id="totalTarget">K0.00</div>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon" style="background: #fbbf2420; color: #fbbf24;"><i class="fas fa-scale-balanced"></i></div>
            <div class="stat-content">
                <h3>Cumulative Balance</h3>
                <div class="stat-value" id="finalCumulativeBalance">K0.00</div>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon" style="background: #6366f120; color: #6366f1;"><i class="fas fa-folder-open"></i></div>
            <div class="stat-content">
                <h3>Total Records</h3>
                <div class="stat-value" id="totalRecords">0</div>
            </div>
        </div>
    </div>

    <div class="action-bar">
        <div class="btn-group">
            <button class="btn btn-refresh" id="refreshBtn"><i class="fas fa-sync-alt"></i> Refresh</button>
            <button class="btn btn-whatsapp" id="whatsappBtn"><i class="fab fa-whatsapp"></i> Share WhatsApp</button>
            <button class="btn btn-sms" id="smsBtn"><i class="fas fa-sms"></i> Share SMS</button>
            <button class="btn btn-email" id="emailBtn"><i class="fas fa-envelope"></i> Email Report</button>
        </div>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr><th>Date</th><th>Time In</th><th>Time Out</th><th>Target</th><th>Cash In</th><th>Balance</th><th>Comments</th></tr>
            </thead>
            <tbody id="tableBody">
                <tr><td colspan="7" style="text-align:center; padding:48px;">Loading...</td</tr>
            </tbody>
        </table>
    </div>
</div>

<div id="overlay" class="overlay"></div>

<div id="recordModal" class="modal">
    <div class="modal-header">
        <h3>New Transaction</h3>
        <button class="close-modal" id="closeModalBtn"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body">
        <div class="form-group">
            <label>Date</label>
            <input type="date" id="inputDate">
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Time In</label>
                <input type="time" id="inputTimeIn">
            </div>
            <div class="form-group">
                <label>Time Out</label>
                <input type="time" id="inputTimeOut">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Target (K)</label>
                <input type="number" id="inputTarget" value="400" step="any" oninput="updateBalancePreview()">
            </div>
            <div class="form-group">
                <label>Cash In (K)</label>
                <input type="number" id="inputCashIn" step="any" oninput="updateBalancePreview()">
            </div>
        </div>
        <div class="form-group">
            <label>Balance Preview</label>
            <input type="number" id="inputBalance" readonly>
        </div>
        <div class="form-group">
            <label>Comments</label>
            <textarea id="inputComments" rows="3"></textarea>
        </div>
        <div class="modal-footer">
            <button class="btn-save" id="saveBtn">Save</button>
            <button class="btn-cancel" id="cancelBtn">Cancel</button>
        </div>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzrsA2UYPyzbRUITAykJa-OntyYI68JXHQuvRPe6QmTxqFYf-OHtAY2d66xG3t-UYY/exec";
    const PHONE_NUMBER = "0978167546";
    
    let allRecords = [];
    
    function updateBalancePreview() {
        const target = parseFloat(document.getElementById('inputTarget').value) || 0;
        const cashIn = parseFloat(document.getElementById('inputCashIn').value) || 0;
        const balance = target - cashIn;
        document.getElementById('inputBalance').value = balance.toFixed(2);
    }
    
    function showToast(message, isError = false) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerHTML = message;
        toast.style.background = isError ? '#ef4444' : '#10b981';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    async function saveRecord() {
        const date = document.getElementById('inputDate').value;
        if (!date) {
            showToast('Date required', true);
            return;
        }
        
        const target = parseFloat(document.getElementById('inputTarget').value) || 0;
        const cashIn = parseFloat(document.getElementById('inputCashIn').value) || 0;
        const balance = target - cashIn;
        
        const formData = new URLSearchParams();
        formData.append('Date', date);
        formData.append('Time In', document.getElementById('inputTimeIn').value || '');
        formData.append('Time Out', document.getElementById('inputTimeOut').value || '');
        formData.append('Target', target);
        formData.append('Cash In', cashIn);
        formData.append('Balance', balance);
        formData.append('Comments', document.getElementById('inputComments').value || '');
        
        try {
            await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: formData,
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
            });
            showToast('Saved!');
            closeModal();
            await loadRecords();
        } catch(err) {
            showToast('Error saving', true);
        }
    }
    
    async function loadRecords() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; padding:48px;">Loading...</td</tr>';
        
        try {
            const response = await fetch(SCRIPT_URL, { method: 'GET', mode: 'cors' });
            const data = await response.json();
            
            if (data.rows && Array.isArray(data.rows)) {
                allRecords = data.rows.slice(1).map(row => ({
                    Date: row[0],
                    TimeIn: row[1],
                    TimeOut: row[2],
                    Target: row[3],
                    CashIn: row[4],
                    Balance: row[5],
                    Comments: row[6]
                })).filter(r => r.Date && r.Date !== '');
            }
            
            displayRecords();
            updateStats();
        } catch(error) {
            tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; color:#f87171;">Failed to load</td</tr>';
        }
    }
    
    function displayRecords() {
        const tbody = document.getElementById('tableBody');
        if (allRecords.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; padding:48px;">No records</td</tr>';
            return;
        }
        
        let html = '';
        let cumTarget = 0, cumCashIn = 0, cumBalance = 0;
        
        allRecords.forEach(record => {
            const target = parseFloat(record.Target) || 0;
            const cashIn = parseFloat(record.CashIn) || 0;
            const balance = parseFloat(record.Balance) || (target - cashIn);
            
            cumTarget += target;
            cumCashIn += cashIn;
            cumBalance += balance;
            
            html += `<tr>
                <td>${record.Date || '—'}</div>
                <td>${record.TimeIn || '—'}</div>
                <td>${record.TimeOut || '—'}</div>
                <td>K${target.toFixed(2)}</div>
                <td>K${cashIn.toFixed(2)}</div>
                <td class="${balance > 0 ? 'val-negative' : balance < 0 ? 'val-positive' : 'val-neutral'}">K${balance.toFixed(2)}</div>
                <td>${(record.Comments || '').substring(0, 30)}</div>
            </tr>`;
        });
        
        tbody.innerHTML = html;
    }
    
    function updateStats() {
        let totalTarget = 0, totalCashIn = 0;
        allRecords.forEach(record => {
            totalTarget += parseFloat(record.Target) || 0;
            totalCashIn += parseFloat(record.CashIn) || 0;
        });
        const cumulativeBalance = totalTarget - totalCashIn;
        
        document.getElementById('totalCashIn').innerHTML = `K${totalCashIn.toFixed(2)}`;
        document.getElementById('totalTarget').innerHTML = `K${totalTarget.toFixed(2)}`;
        document.getElementById('finalCumulativeBalance').innerHTML = `K${cumulativeBalance.toFixed(2)}`;
        document.getElementById('totalRecords').innerHTML = allRecords.length;
    }
    
    function openModal() {
        document.getElementById('inputDate').value = new Date().toISOString().slice(0,10);
        document.getElementById('inputTimeIn').value = '';
        document.getElementById('inputTimeOut').value = '';
        document.getElementById('inputTarget').value = '400';
        document.getElementById('inputCashIn').value = '';
        document.getElementById('inputBalance').value = '';
        document.getElementById('inputComments').value = '';
        document.getElementById('recordModal').classList.add('show');
        document.getElementById('overlay').classList.add('show');
    }
    
    function closeModal() {
        document.getElementById('recordModal').classList.remove('show');
        document.getElementById('overlay').classList.remove('show');
    }
    
    document.getElementById('openModalBtn').onclick = openModal;
    document.getElementById('closeModalBtn').onclick = closeModal;
    document.getElementById('cancelBtn').onclick = closeModal;
    document.getElementById('saveBtn').onclick = saveRecord;
    document.getElementById('refreshBtn').onclick = loadRecords;
    document.getElementById('overlay').onclick = closeModal;
    
    document.getElementById('whatsappBtn').onclick = () => {
        window.open(`https://wa.me/${PHONE_NUMBER}?text=${encodeURIComponent('CashFlow Report')}`, '_blank');
    };
    document.getElementById('smsBtn').onclick = () => {
        window.open(`sms:${PHONE_NUMBER}?body=${encodeURIComponent('CashFlow Report')}`, '_blank');
    };
    document.getElementById('emailBtn').onclick = () => {
        window.location.href = `mailto:?subject=CashFlow Report`;
    };
    
    loadRecords();
</script>
</body>
</html>
