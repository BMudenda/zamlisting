<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>CashFlow Pro | Smart Cash Tracker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            background: white;
            border-radius: 20px;
            padding: 16px 24px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .logo h1 {
            font-size: 1.5rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo p {
            font-size: 0.7rem;
            color: #666;
        }

        .add-btn {
            background: linear-gradient(135deg, #10b981, #059669);
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            transition: 0.2s;
        }

        .add-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(16,185,129,0.4);
        }

        /* Stats Cards */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-3px);
        }

        .stat-card i {
            font-size: 28px;
            margin-bottom: 8px;
        }

        .stat-card h3 {
            font-size: 12px;
            color: #666;
            margin-bottom: 8px;
        }

        .stat-card .value {
            font-size: 28px;
            font-weight: bold;
            color: #1f2937;
        }

        /* Modal */
        .modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            border-radius: 28px;
            width: 90%;
            max-width: 500px;
            z-index: 1000;
            display: none;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            animation: modalIn 0.3s ease;
        }

        @keyframes modalIn {
            from {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        .modal.show {
            display: block;
        }

        .modal-header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 20px 24px;
            border-radius: 28px 28px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h3 {
            font-size: 1.2rem;
        }

        .close-modal {
            background: rgba(255,255,255,0.2);
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            color: white;
            cursor: pointer;
            font-size: 1.1rem;
        }

        .modal-body {
            padding: 24px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 0.8rem;
            margin-bottom: 6px;
            color: #374151;
        }

        .form-group label i {
            margin-right: 6px;
            color: #667eea;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e5e7eb;
            border-radius: 14px;
            font-size: 0.9rem;
            transition: 0.2s;
        }

        .form-group input:focus, .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-group input[readonly] {
            background: #f3f4f6;
            font-weight: bold;
            color: #059669;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .modal-footer {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .btn-save {
            flex: 1;
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-cancel {
            flex: 1;
            background: #f3f4f6;
            border: none;
            padding: 12px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 999;
            display: none;
        }

        .overlay.show {
            display: block;
        }

        /* Action Bar */
        .action-bar {
            background: white;
            border-radius: 20px;
            padding: 12px 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .action-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .action-btn {
            background: #f3f4f6;
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            transition: 0.2s;
        }

        .action-btn:hover {
            transform: translateY(-2px);
        }

        .btn-whatsapp { background: #25D366; color: white; }
        .btn-sms { background: #34b7f1; color: white; }
        .btn-email { background: #3b82f6; color: white; }
        .btn-refresh { background: #8b5cf6; color: white; }

        .select-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* Table */
        .table-wrapper {
            background: white;
            border-radius: 20px;
            overflow-x: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #f9fafb;
            padding: 14px 12px;
            text-align: left;
            font-weight: 600;
            color: #374151;
            border-bottom: 2px solid #e5e7eb;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #f3f4f6;
            cursor: pointer;
        }

        tr:hover {
            background: #f9fafb;
        }

        tr.selected {
            background: #eef2ff;
        }

        .checkbox-col {
            width: 40px;
            text-align: center;
        }

        .actions-cell {
            display: flex;
            gap: 6px;
        }

        .icon-btn {
            background: none;
            border: none;
            padding: 6px 10px;
            border-radius: 30px;
            cursor: pointer;
        }

        .icon-view { background: #eef2ff; color: #667eea; }
        .icon-edit { background: #fef3c7; color: #d97706; }
        .icon-delete { background: #fee2e2; color: #dc2626; }

        .badge-positive { color: #10b981; font-weight: bold; }
        .badge-negative { color: #dc2626; font-weight: bold; }
        .badge-zero { color: #f59e0b; font-weight: bold; }

        /* Card View */
        .view-card {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            border-radius: 28px;
            width: 90%;
            max-width: 450px;
            z-index: 1002;
            display: none;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }

        .view-card.show {
            display: block;
            animation: modalIn 0.3s ease;
        }

        .card-header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 20px;
            border-radius: 28px 28px 0 0;
        }

        .card-body {
            padding: 20px;
        }

        .card-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #f3f4f6;
        }

        .card-item:last-child {
            border-bottom: none;
        }

        .card-label {
            font-weight: 600;
            color: #6b7280;
        }

        .card-value {
            font-weight: 500;
            color: #1f2937;
        }

        .card-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid #e5e7eb;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #1f2937;
            color: white;
            padding: 12px 20px;
            border-radius: 40px;
            font-size: 0.8rem;
            z-index: 1100;
            animation: fadeOut 3s ease;
        }

        @keyframes fadeOut {
            0% { opacity: 0; transform: translateY(20px); }
            15% { opacity: 1; transform: translateY(0); }
            85% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(20px); }
        }

        .loading {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .loading-spinner {
            background: white;
            padding: 20px 30px;
            border-radius: 30px;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        @media (max-width: 768px) {
            .stats {
                grid-template-columns: repeat(2, 1fr);
            }
            .action-bar {
                flex-direction: column;
                align-items: stretch;
            }
            .action-group {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <!-- Header -->
    <div class="header">
        <div class="logo">
            <h1><i class="fas fa-coins"></i> CashFlow Pro</h1>
            <p><i class="fab fa-google"></i> Live Google Sheets</p>
        </div>
        <button class="add-btn" id="openModalBtn"><i class="fas fa-plus"></i> Add Record</button>
    </div>

    <!-- Stats -->
    <div class="stats">
        <div class="stat-card">
            <i class="fas fa-chart-line" style="color: #10b981;"></i>
            <h3>Total Cash In</h3>
            <div class="value" id="totalCashIn">K0</div>
        </div>
        <div class="stat-card">
            <i class="fas fa-bullseye" style="color: #f59e0b;"></i>
            <h3>Total Target</h3>
            <div class="value" id="totalTarget">K0</div>
        </div>
        <div class="stat-card">
            <i class="fas fa-balance-scale" style="color: #667eea;"></i>
            <h3>Overall Balance</h3>
            <div class="value" id="overallBalance">K0</div>
        </div>
        <div class="stat-card">
            <i class="fas fa-database" style="color: #764ba2;"></i>
            <h3>Records</h3>
            <div class="value" id="totalRecords">0</div>
        </div>
    </div>

    <!-- Action Bar -->
    <div class="action-bar">
        <div class="action-group">
            <button class="action-btn btn-refresh" id="refreshBtn"><i class="fas fa-sync-alt"></i> Refresh</button>
            <button class="action-btn btn-whatsapp" id="whatsappSelectedBtn"><i class="fab fa-whatsapp"></i> WhatsApp</button>
            <button class="action-btn btn-sms" id="smsSelectedBtn"><i class="fas fa-sms"></i> SMS</button>
            <button class="action-btn btn-email" id="emailSelectedBtn"><i class="fas fa-envelope"></i> Email</button>
        </div>
        <div class="select-info">
            <input type="checkbox" id="selectAllCheckbox"> <label for="selectAllCheckbox">Select All</label>
            <span id="selectedCount">0 selected</span>
        </div>
    </div>

    <!-- Table -->
    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th class="checkbox-col"><i class="far fa-square"></i></th>
                    <th>Date</th>
                    <th>Time In</th>
                    <th>Time Out</th>
                    <th>Target</th>
                    <th>Cash In</th>
                    <th>Balance</th>
                    <th>Comments</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <td><td colspan="9" style="text-align:center; padding:40px;"><i class="fas fa-spinner fa-pulse"></i> Loading...</td</tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Modal for Add/Edit -->
<div id="modalOverlay" class="overlay"></div>
<div id="recordModal" class="modal">
    <div class="modal-header">
        <h3 id="modalTitle"><i class="fas fa-plus"></i> Add Record</h3>
        <button class="close-modal" id="closeModalBtn"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body">
        <div class="form-group">
            <label><i class="fas fa-calendar"></i> Date *</label>
            <input type="date" id="inputDate">
        </div>
        <div class="form-row">
            <div class="form-group">
                <label><i class="fas fa-clock"></i> Time In</label>
                <input type="time" id="inputTimeIn">
            </div>
            <div class="form-group">
                <label><i class="fas fa-clock"></i> Time Out</label>
                <input type="time" id="inputTimeOut">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label><i class="fas fa-bullseye"></i> Target (K)</label>
                <input type="number" id="inputTarget" value="400" step="any">
            </div>
            <div class="form-group">
                <label><i class="fas fa-money-bill"></i> Cash In (K)</label>
                <input type="number" id="inputCashIn" step="any">
            </div>
        </div>
        <div class="form-group">
            <label><i class="fas fa-balance-scale"></i> Balance (K) - Auto Calculated</label>
            <input type="number" id="inputBalance" readonly>
        </div>
        <div class="form-group">
            <label><i class="fas fa-comment"></i> Comments</label>
            <textarea id="inputComments" rows="2" placeholder="Optional notes..."></textarea>
        </div>
        <div class="modal-footer">
            <button class="btn-save" id="saveBtn"><i class="fas fa-save"></i> Save</button>
            <button class="btn-cancel" id="cancelBtn">Cancel</button>
        </div>
    </div>
</div>

<!-- Card View Modal -->
<div id="cardModal" class="view-card">
    <div class="card-header">
        <h3><i class="fas fa-id-card"></i> Record Details</h3>
    </div>
    <div class="card-body" id="cardBody"></div>
</div>

<script>
    // ========== CONFIGURATION ==========
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzrsA2UYPyzbRUITAykJa-OntyYI68JXHQuvRPe6QmTxqFYf-OHtAY2d66xG3t-UYY/exec";
    const SHARE_NUMBER = "0978167546";
    
    let records = [];
    let editingId = null;
    let currentViewIndex = null;

    // ========== BALANCE CALCULATION (SIMPLE & WORKING) ==========
    function calculateBalance() {
        const target = parseFloat(document.getElementById("inputTarget").value) || 0;
        const cashIn = parseFloat(document.getElementById("inputCashIn").value) || 0;
        const balance = cashIn - target;
        document.getElementById("inputBalance").value = balance.toFixed(2);
        
        // Color feedback
        const balanceField = document.getElementById("inputBalance");
        if (balance > 0) balanceField.style.color = "#10b981";
        else if (balance < 0) balanceField.style.color = "#dc2626";
        else balanceField.style.color = "#f59e0b";
    }

    // Attach balance calculation listeners
    document.getElementById("inputTarget").addEventListener("input", calculateBalance);
    document.getElementById("inputCashIn").addEventListener("input", calculateBalance);

    // ========== UI Helpers ==========
    function showToast(message, isError = false) {
        const toast = document.createElement("div");
        toast.className = "toast";
        toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i> ${message}`;
        toast.style.background = isError ? "#dc2626" : "#10b981";
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    function showLoading(show) {
        let loader = document.getElementById("globalLoader");
        if (show) {
            if (!loader) {
                loader = document.createElement("div");
                loader.id = "globalLoader";
                loader.className = "loading";
                loader.innerHTML = '<div class="loading-spinner"><i class="fas fa-spinner fa-pulse"></i> Processing...</div>';
                document.body.appendChild(loader);
            }
        } else if (loader) {
            loader.remove();
        }
    }

    // ========== GOOGLE SHEET OPERATIONS ==========
    async function loadFromSheet() {
        const tbody = document.getElementById("tableBody");
        tbody.innerHTML = `<tr><td colspan="9" style="text-align:center; padding:40px;"><i class="fas fa-spinner fa-pulse"></i> Loading...</td</tr`;
        
        try {
            const response = await fetch(SCRIPT_URL, { method: "GET", mode: "cors" });
            if (!response.ok) throw new Error();
            const data = await response.json();
            
            records = (data.rows || []).filter(row => row.Date && row.Date !== "").map((row, idx) => ({
                id: Date.now() + idx,
                date: row.Date,
                timeIn: row["Time In"] || "",
                timeOut: row["Time Out"] || "",
                target: Number(row.Target) || 0,
                cashIn: Number(row["Cash In"]) || 0,
                balance: Number(row.Balance) || 0,
                comments: row.Comments || "",
                timestamp: row.Timestamp || ""
            }));
            
            renderTable();
            updateStats();
            showToast(`Loaded ${records.length} records`);
            
        } catch (error) {
            tbody.innerHTML = `<tr><td colspan="9" style="text-align:center; color:red; padding:40px;">Failed to load data</td</tr`;
            showToast("Failed to load from Google Sheet", true);
        }
    }

    async function saveToSheet(record) {
        const params = new URLSearchParams();
        params.append("Date", record.date);
        params.append("Time In", record.timeIn);
        params.append("Time Out", record.timeOut);
        params.append("Target", record.target);
        params.append("Cash In", record.cashIn);
        params.append("Balance", record.balance);
        params.append("Comments", record.comments);
        
        try {
            await fetch(SCRIPT_URL, {
                method: "POST",
                mode: "no-cors",
                body: params.toString(),
                headers: { "Content-Type": "application/x-www-form-urlencoded" }
            });
            return true;
        } catch (err) {
            return false;
        }
    }

    // ========== CRUD Operations ==========
    async function addRecord(recordData) {
        showLoading(true);
        const success = await saveToSheet(recordData);
        showLoading(false);
        
        if (success) {
            showToast("Record saved to Google Sheet!");
            closeModal();
            await loadFromSheet();
        } else {
            showToast("Failed to save", true);
        }
    }

    async function deleteRecord(id) {
        if (!confirm("Delete this record?")) return;
        
        const remaining = records.filter(r => r.id !== id);
        showLoading(true);
        
        let success = true;
        for (const record of remaining) {
            const ok = await saveToSheet({
                date: record.date,
                timeIn: record.timeIn,
                timeOut: record.timeOut,
                target: record.target,
                cashIn: record.cashIn,
                balance: record.balance,
                comments: record.comments
            });
            if (!ok) success = false;
        }
        
        showLoading(false);
        
        if (success) {
            showToast("Record deleted");
            if (currentViewIndex !== null) closeCard();
            await loadFromSheet();
        } else {
            showToast("Error deleting", true);
        }
    }

    // ========== Render Table ==========
    function renderTable() {
        const tbody = document.getElementById("tableBody");
        
        if (records.length === 0) {
            tbody.innerHTML = `<tr><td colspan="9" style="text-align:center; padding:40px;">No records. Click + to add</td</tr`;
            return;
        }
        
        const sorted = [...records].sort((a, b) => b.date.localeCompare(a.date));
        
        tbody.innerHTML = sorted.map((rec, idx) => {
            const originalIdx = records.findIndex(r => r.id === rec.id);
            const balanceClass = rec.balance > 0 ? "badge-positive" : rec.balance < 0 ? "badge-negative" : "badge-zero";
            const balanceSign = rec.balance > 0 ? "+" : "";
            
            return `
                <tr onclick="viewRecord(${originalIdx})" class="${currentViewIndex === originalIdx ? 'selected' : ''}">
                    <td class="checkbox-col" onclick="event.stopPropagation()">
                        <input type="checkbox" class="record-checkbox" data-id="${rec.id}">
                    </td>
                    <td>${rec.date}</td>
                    <td>${rec.timeIn || "—"}</td>
                    <td>${rec.timeOut || "—"}</td>
                    <td>K${rec.target.toFixed(2)}</td>
                    <td>K${rec.cashIn.toFixed(2)}</td>
                    <td class="${balanceClass}">${balanceSign}K${Math.abs(rec.balance).toFixed(2)}</td>
                    <td style="max-width:150px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;" title="${escapeHtml(rec.comments)}">
                        ${rec.comments ? (rec.comments.length > 25 ? rec.comments.substring(0, 25) + "..." : rec.comments) : "—"}
                    </td>
                    <td class="actions-cell" onclick="event.stopPropagation()">
                        <button class="icon-btn icon-view" onclick="viewRecord(${originalIdx})"><i class="fas fa-eye"></i></button>
                        <button class="icon-btn icon-edit" onclick="editRecord(${originalIdx})"><i class="fas fa-pen"></i></button>
                        <button class="icon-btn icon-delete" onclick="deleteRecord(${rec.id})"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>
            `;
        }).join("");
        
        attachCheckboxEvents();
        updateSelectedCount();
    }

    function viewRecord(index) {
        currentViewIndex = index;
        const r = records[index];
        renderTable();
        
        const balanceClass = r.balance > 0 ? "badge-positive" : r.balance < 0 ? "badge-negative" : "badge-zero";
        
        document.getElementById("cardBody").innerHTML = `
            <div class="card-item"><span class="card-label"><i class="fas fa-calendar"></i> Date</span><span class="card-value">${r.date}</span></div>
            <div class="card-item"><span class="card-label"><i class="fas fa-clock"></i> Time In</span><span class="card-value">${r.timeIn || "—"}</span></div>
            <div class="card-item"><span class="card-label"><i class="fas fa-clock"></i> Time Out</span><span class="card-value">${r.timeOut || "—"}</span></div>
            <div class="card-item"><span class="card-label"><i class="fas fa-bullseye"></i> Target</span><span class="card-value">K${r.target.toFixed(2)}</span></div>
            <div class="card-item"><span class="card-label"><i class="fas fa-money-bill"></i> Cash In</span><span class="card-value">K${r.cashIn.toFixed(2)}</span></div>
            <div class="card-item"><span class="card-label"><i class="fas fa-balance-scale"></i> Balance</span><span class="card-value ${balanceClass}">K${r.balance.toFixed(2)}</span></div>
            <div class="card-item"><span class="card-label"><i class="fas fa-comment"></i> Comments</span><span class="card-value">${escapeHtml(r.comments) || "—"}</span></div>
            <div class="card-item"><span class="card-label"><i class="fas fa-timestamp"></i> Timestamp</span><span class="card-value">${r.timestamp || "—"}</span></div>
            <div class="card-actions">
                <button class="btn-save" style="flex:1" onclick="editRecord(${index}); closeCard();"><i class="fas fa-edit"></i> Edit</button>
                <button class="btn-save" style="background:#25D366; flex:1" onclick="shareRecordWhatsApp(${index}); closeCard();"><i class="fab fa-whatsapp"></i> Share</button>
                <button class="btn-cancel" style="flex:0.3" onclick="closeCard()"><i class="fas fa-times"></i></button>
            </div>
        `;
        
        document.getElementById("cardModal").classList.add("show");
        document.getElementById("modalOverlay").classList.add("show");
    }

    function closeCard() {
        document.getElementById("cardModal").classList.remove("show");
        document.getElementById("modalOverlay").classList.remove("show");
        currentViewIndex = null;
        renderTable();
    }

    function editRecord(index) {
        const r = records[index];
        editingId = r.id;
        document.getElementById("modalTitle").innerHTML = "<i class='fas fa-edit'></i> Edit Record";
        document.getElementById("inputDate").value = r.date;
        document.getElementById("inputTimeIn").value = r.timeIn;
        document.getElementById("inputTimeOut").value = r.timeOut;
        document.getElementById("inputTarget").value = r.target;
        document.getElementById("inputCashIn").value = r.cashIn;
        document.getElementById("inputBalance").value = r.balance;
        document.getElementById("inputComments").value = r.comments;
        document.getElementById("recordModal").classList.add("show");
        document.getElementById("modalOverlay").classList.add("show");
        calculateBalance();
    }

    async function saveRecord() {
        const date = document.getElementById("inputDate").value;
        if (!date) {
            showToast("Please select a date", true);
            return;
        }
        
        calculateBalance();
        
        const target = parseFloat(document.getElementById("inputTarget").value) || 0;
        const cashIn = parseFloat(document.getElementById("inputCashIn").value) || 0;
        const balance = cashIn - target;
        
        const recordData = {
            date: date,
            timeIn: document.getElementById("inputTimeIn").value || "",
            timeOut: document.getElementById("inputTimeOut").value || "",
            target: target,
            cashIn: cashIn,
            balance: balance,
            comments: document.getElementById("inputComments").value || ""
        };
        
        await addRecord(recordData);
    }

    // ========== SHARE FUNCTIONS ==========
    function getSelectedRecords() {
        const checked = document.querySelectorAll(".record-checkbox:checked");
        const ids = Array.from(checked).map(cb => cb.getAttribute("data-id"));
        return records.filter(r => ids.includes(String(r.id)));
    }

    function formatRecordMessage(record) {
        const balanceSign = record.balance > 0 ? "+" : "";
        return `📊 *CASH TRANSACTION*\n\n` +
            `📅 Date: ${record.date}\n` +
            `⏰ Time: ${record.timeIn || "—"} → ${record.timeOut || "—"}\n` +
            `🎯 Target: K${record.target.toFixed(2)}\n` +
            `💰 Cash In: K${record.cashIn.toFixed(2)}\n` +
            `⚖️ Balance: ${balanceSign}K${record.balance.toFixed(2)}\n` +
            `${record.comments ? `📝 Notes: ${record.comments}\n` : ""}\n` +
            `_Sent from CashFlow Pro_`;
    }

    function formatMultipleMessage(selected) {
        let totalCash = 0, totalTarget = 0, totalBal = 0;
        let lines = ["📊 *CASHFLOW REPORT*", "━━━━━━━━━━━━━━━━━━", ""];
        
        selected.forEach((r, i) => {
            totalCash += r.cashIn;
            totalTarget += r.target;
            totalBal += r.balance;
            lines.push(`${i+1}. ${r.date} | In: K${r.cashIn.toFixed(2)} | Bal: K${r.balance.toFixed(2)}`);
            if (r.comments) lines.push(`   📝 ${r.comments}`);
        });
        
        lines.push("", "━━━━━━━━━━━━━━━━━━");
        lines.push(`💰 Total Cash In: K${totalCash.toFixed(2)}`);
        lines.push(`🎯 Total Target: K${totalTarget.toFixed(2)}`);
        lines.push(`⚖️ Total Balance: K${totalBal.toFixed(2)}`);
        lines.push("", "_Sent from CashFlow Pro_");
        
        return lines.join("\n");
    }

    function shareRecordWhatsApp(index) {
        const msg = formatRecordMessage(records[index]);
        window.open(`https://wa.me/${SHARE_NUMBER}?text=${encodeURIComponent(msg)}`, "_blank");
    }

    function shareSelectedWhatsApp() {
        const selected = getSelectedRecords();
        if (selected.length === 0) { showToast("Select records first", true); return; }
        const msg = selected.length === 1 ? formatRecordMessage(selected[0]) : formatMultipleMessage(selected);
        window.open(`https://wa.me/${SHARE_NUMBER}?text=${encodeURIComponent(msg)}`, "_blank");
    }

    function shareSelectedSMS() {
        const selected = getSelectedRecords();
        if (selected.length === 0) { showToast("Select records first", true); return; }
        const msg = selected.length === 1 ? formatRecordMessage(selected[0]) : formatMultipleMessage(selected);
        window.open(`sms:${SHARE_NUMBER}?body=${encodeURIComponent(msg)}`, "_blank");
    }

    function emailSelected() {
        const selected = getSelectedRecords();
        if (selected.length === 0) { showToast("Select records first", true); return; }
        const msg = selected.length === 1 ? formatRecordMessage(selected[0]).replace(/\*/g, "") : formatMultipleMessage(selected).replace(/\*/g, "");
        window.location.href = `mailto:?subject=CashFlow Report&body=${encodeURIComponent(msg)}`;
    }

    // ========== UI Helpers ==========
    function updateStats() {
        let totalCash = 0, totalTarget = 0, totalBal = 0;
        records.forEach(r => {
            totalCash += r.cashIn;
            totalTarget += r.target;
            totalBal += r.balance;
        });
        document.getElementById("totalCashIn").innerHTML = `K${totalCash.toFixed(2)}`;
        document.getElementById("totalTarget").innerHTML = `K${totalTarget.toFixed(2)}`;
        document.getElementById("overallBalance").innerHTML = `K${totalBal.toFixed(2)}`;
        document.getElementById("totalRecords").innerHTML = records.length;
    }

    function attachCheckboxEvents() {
        document.querySelectorAll(".record-checkbox").forEach(cb => {
            cb.onchange = () => updateSelectedCount();
        });
        document.getElementById("selectAllCheckbox").onchange = (e) => {
            document.querySelectorAll(".record-checkbox").forEach(cb => cb.checked = e.target.checked);
            updateSelectedCount();
        };
    }

    function updateSelectedCount() {
        const count = document.querySelectorAll(".record-checkbox:checked").length;
        document.getElementById("selectedCount").innerHTML = `${count} selected`;
    }

    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, m => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[m]));
    }

    function openModal() {
        editingId = null;
        document.getElementById("modalTitle").innerHTML = "<i class='fas fa-plus'></i> Add Record";
        document.getElementById("inputDate").value = new Date().toISOString().slice(0,10);
        document.getElementById("inputTimeIn").value = "";
        document.getElementById("inputTimeOut").value = "";
        document.getElementById("inputTarget").value = 400;
        document.getElementById("inputCashIn").value = "";
        document.getElementById("inputBalance").value = "";
        document.getElementById("inputComments").value = "";
        document.getElementById("recordModal").classList.add("show");
        document.getElementById("modalOverlay").classList.add("show");
        calculateBalance();
    }

    function closeModal() {
        document.getElementById("recordModal").classList.remove("show");
        document.getElementById("modalOverlay").classList.remove("show");
        editingId = null;
    }

    // ========== EVENT LISTENERS ==========
    document.getElementById("openModalBtn").onclick = openModal;
    document.getElementById("closeModalBtn").onclick = closeModal;
    document.getElementById("cancelBtn").onclick = closeModal;
    document.getElementById("saveBtn").onclick = saveRecord;
    document.getElementById("refreshBtn").onclick = loadFromSheet;
    document.getElementById("whatsappSelectedBtn").onclick = shareSelectedWhatsApp;
    document.getElementById("smsSelectedBtn").onclick = shareSelectedSMS;
    document.getElementById("emailSelectedBtn").onclick = emailSelected;
    
    document.getElementById("modalOverlay").onclick = () => {
        closeModal();
        closeCard();
    };

    // Initialize
    loadFromSheet();
    
    window.viewRecord = viewRecord;
    window.editRecord = editRecord;
    window.deleteRecord = deleteRecord;
    window.closeCard = closeCard;
    window.shareRecordWhatsApp = shareRecordWhatsApp;
</script>
</body>
</html>
