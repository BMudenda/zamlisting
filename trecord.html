<!DOCTYPE html>
<html>
<head>
  <title>Simple Form</title>
</head>
<body>

<h3>Submit Name</h3>

<input id="first" placeholder="First Name">
<input id="last" placeholder="Last Name">

<button onclick="send()">Submit</button>

<p id="msg"></p>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbz6QEjxpzIODm7SZ0bq6DXJjnUPhZjY2pst-mYKwsCAfBj__uleIcKXQ_oiyrpoTAM/exec";

function send() {
  const msg = document.getElementById("msg");

  const data = {
    "First Name": document.getElementById("first").value,
    "Last Name": document.getElementById("last").value
  };

  const body = Object.keys(data)
    .map(key => encodeURIComponent(key) + "=" + encodeURIComponent(data[key]))
    .join("&");

  fetch(scriptURL, {
    method: "POST",
    headers: {
      "Content-Type": "application/x-www-form-urlencoded"
    },
    body: body
  })
  .then(r => r.json())
  .then(res => {
    if (res.result === "success") {
      msg.innerText = "Saved successfully!";
    } else {
      msg.innerText = "Error: " + res.error;
    }
  })
  .catch(err => {
    msg.innerText = "Network error";
    console.error(err);
  });
}
</script>

</body>
</html>
