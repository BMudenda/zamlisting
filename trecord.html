<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Cash Tracker - Simple & Working</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        /* Header */
        .header {
            background: white;
            border-radius: 20px;
            padding: 16px 24px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .logo h1 {
            font-size: 1.5rem;
            color: #333;
        }
        .logo p {
            font-size: 0.7rem;
            color: #666;
        }
        .add-btn {
            background: #10b981;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        /* Stats */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .stat-card .value {
            font-size: 28px;
            font-weight: bold;
            margin-top: 8px;
        }
        /* Action Bar */
        .action-bar {
            background: white;
            border-radius: 20px;
            padding: 12px 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 8px 16px;
            border-radius: 40px;
            border: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
        }
        .btn-whatsapp { background: #25D366; color: white; }
        .btn-sms { background: #34b7f1; color: white; }
        .btn-refresh { background: #8b5cf6; color: white; }
        /* Table */
        .table-wrapper {
            background: white;
            border-radius: 20px;
            overflow-x: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th {
            background: #f8f9fa;
            padding: 14px 12px;
            text-align: left;
            border-bottom: 2px solid #e5e7eb;
        }
        td {
            padding: 12px;
            border-bottom: 1px solid #f3f4f6;
        }
        tr {
            cursor: pointer;
        }
        tr:hover {
            background: #f9fafb;
        }
        .balance-positive { color: #10b981; font-weight: bold; }
        .balance-negative { color: #dc2626; font-weight: bold; }
        .balance-zero { color: #f59e0b; font-weight: bold; }
        /* Modal */
        .modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            border-radius: 24px;
            width: 90%;
            max-width: 500px;
            z-index: 1000;
            display: none;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .modal.show {
            display: block;
        }
        .modal-header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 20px;
            border-radius: 24px 24px 0 0;
            display: flex;
            justify-content: space-between;
        }
        .modal-body {
            padding: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 0.8rem;
            margin-bottom: 5px;
        }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 0.9rem;
        }
        .form-group input[readonly] {
            background: #f3f4f6;
            font-weight: bold;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .modal-footer {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }
        .btn-save {
            flex: 1;
            background: #10b981;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-cancel {
            flex: 1;
            background: #f3f4f6;
            border: none;
            padding: 12px;
            border-radius: 40px;
            cursor: pointer;
        }
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 999;
            display: none;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #333;
            color: white;
            padding: 12px 20px;
            border-radius: 40px;
            z-index: 1100;
            animation: fadeOut 3s ease;
        }
        @keyframes fadeOut {
            0% { opacity: 0; transform: translateY(20px); }
            15% { opacity: 1; transform: translateY(0); }
            85% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(20px); }
        }
        .checkbox-col {
            width: 40px;
            text-align: center;
        }
        .selected {
            background: #eef2ff;
        }
    </style>
</head>
<body>
<div class="container">
    <!-- Header -->
    <div class="header">
        <div class="logo">
            <h1>💰 Cash Tracker</h1>
            <p>Live Google Sheets Sync</p>
        </div>
        <button class="add-btn" id="openModalBtn"><i class="fas fa-plus"></i> Add Record</button>
    </div>

    <!-- Stats -->
    <div class="stats">
        <div class="stat-card">
            <i class="fas fa-chart-line" style="color: #10b981;"></i>
            <h3>Total Cash In</h3>
            <div class="value" id="totalCashIn">K0</div>
        </div>
        <div class="stat-card">
            <i class="fas fa-bullseye" style="color: #f59e0b;"></i>
            <h3>Total Target</h3>
            <div class="value" id="totalTarget">K0</div>
        </div>
        <div class="stat-card">
            <i class="fas fa-balance-scale" style="color: #667eea;"></i>
            <h3>Overall Balance</h3>
            <div class="value" id="overallBalance">K0</div>
        </div>
    </div>

    <!-- Action Bar -->
    <div class="action-bar">
        <div class="btn-group">
            <button class="btn btn-refresh" id="refreshBtn"><i class="fas fa-sync-alt"></i> Refresh</button>
            <button class="btn btn-whatsapp" id="whatsappBtn"><i class="fab fa-whatsapp"></i> WhatsApp</button>
            <button class="btn btn-sms" id="smsBtn"><i class="fas fa-sms"></i> SMS</button>
        </div>
        <div>
            <input type="checkbox" id="selectAll"> <label for="selectAll">Select All</label>
            <span id="selectedCount" style="margin-left: 10px;">0 selected</span>
        </div>
    </div>

    <!-- Table -->
    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th class="checkbox-col"><i class="far fa-square"></i></th>
                    <th>Date</th>
                    <th>Time In</th>
                    <th>Time Out</th>
                    <th>Target (K)</th>
                    <th>Cash In (K)</th>
                    <th>Balance (K)</th>
                    <th>Comments</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr><td colspan="8" style="text-align:center; padding:40px;">Loading...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Modal -->
<div id="overlay" class="overlay"></div>
<div id="modal" class="modal">
    <div class="modal-header">
        <h3 id="modalTitle"><i class="fas fa-plus"></i> Add Record</h3>
        <button style="background:none; border:none; color:white; font-size:1.5rem; cursor:pointer;" id="closeModalBtn">&times;</button>
    </div>
    <div class="modal-body">
        <div class="form-group">
            <label><i class="fas fa-calendar"></i> Date *</label>
            <input type="date" id="inputDate">
        </div>
        <div class="form-row">
            <div class="form-group">
                <label><i class="fas fa-clock"></i> Time In</label>
                <input type="time" id="inputTimeIn">
            </div>
            <div class="form-group">
                <label><i class="fas fa-clock"></i> Time Out</label>
                <input type="time" id="inputTimeOut">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label><i class="fas fa-bullseye"></i> Target (K)</label>
                <input type="number" id="inputTarget" value="400" step="any">
            </div>
            <div class="form-group">
                <label><i class="fas fa-money-bill"></i> Cash In (K)</label>
                <input type="number" id="inputCashIn" step="any">
            </div>
        </div>
        <div class="form-group">
            <label><i class="fas fa-balance-scale"></i> Balance (K) - Auto Calculated</label>
            <input type="number" id="inputBalance" readonly style="background:#f0fdf4; color:#10b981;">
        </div>
        <div class="form-group">
            <label><i class="fas fa-comment"></i> Comments</label>
            <textarea id="inputComments" rows="2" placeholder="Notes..."></textarea>
        </div>
        <div class="modal-footer">
            <button class="btn-save" id="saveBtn"><i class="fas fa-save"></i> Save</button>
            <button class="btn-cancel" id="cancelBtn">Cancel</button>
        </div>
    </div>
</div>

<script>
    // ============ CONFIG ============
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzrsA2UYPyzbRUITAykJa-OntyYI68JXHQuvRPe6QmTxqFYf-OHtAY2d66xG3t-UYY/exec";
    const SHARE_NUMBER = "0978167546";
    
    let records = [];
    let editingId = null;

    // ============ BALANCE CALCULATION - SIMPLE & GUARANTEED ============
    function updateBalance() {
        const target = parseFloat(document.getElementById("inputTarget").value) || 0;
        const cashIn = parseFloat(document.getElementById("inputCashIn").value) || 0;
        const balance = cashIn - target;
        document.getElementById("inputBalance").value = balance.toFixed(2);
        
        // Visual feedback
        const balanceField = document.getElementById("inputBalance");
        if (balance > 0) {
            balanceField.style.color = "#10b981";
            balanceField.style.background = "#f0fdf4";
        } else if (balance < 0) {
            balanceField.style.color = "#dc2626";
            balanceField.style.background = "#fef2f2";
        } else {
            balanceField.style.color = "#f59e0b";
            balanceField.style.background = "#fffbeb";
        }
    }

    // Attach balance calculation to input fields
    document.getElementById("inputTarget").addEventListener("input", updateBalance);
    document.getElementById("inputCashIn").addEventListener("input", updateBalance);

    // ============ UI Helpers ============
    function showToast(msg, isError = false) {
        const toast = document.createElement("div");
        toast.className = "toast";
        toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i> ${msg}`;
        toast.style.background = isError ? "#dc2626" : "#10b981";
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    function showLoading(show) {
        let loader = document.getElementById("loader");
        if (show && !loader) {
            loader = document.createElement("div");
            loader.id = "loader";
            loader.style.cssText = "position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.5); display:flex; align-items:center; justify-content:center; z-index:2000;";
            loader.innerHTML = '<div style="background:white; padding:20px 30px; border-radius:30px;"><i class="fas fa-spinner fa-pulse"></i> Processing...</div>';
            document.body.appendChild(loader);
        } else if (!show && loader) {
            loader.remove();
        }
    }

    // ============ GOOGLE SHEET OPERATIONS ============
    async function loadFromSheet() {
        const tbody = document.getElementById("tableBody");
        tbody.innerHTML = '<tr><td colspan="8" style="text-align:center; padding:40px;"><i class="fas fa-spinner fa-pulse"></i> Loading...</td></tr>';
        
        try {
            const response = await fetch(SCRIPT_URL, { method: "GET", mode: "cors" });
            if (!response.ok) throw new Error();
            const data = await response.json();
            
            records = (data.rows || []).filter(row => row.Date && row.Date !== "").map((row, idx) => ({
                id: Date.now() + idx,
                date: row.Date,
                timeIn: row["Time In"] || "",
                timeOut: row["Time Out"] || "",
                target: Number(row.Target) || 0,
                cashIn: Number(row["Cash In"]) || 0,
                balance: Number(row.Balance) || 0,
                comments: row.Comments || "",
                timestamp: row.Timestamp || ""
            }));
            
            renderTable();
            updateStats();
            showToast(`Loaded ${records.length} records`);
            
        } catch (error) {
            tbody.innerHTML = '<tr><td colspan="8" style="text-align:center; color:red; padding:40px;">Failed to load data</td></tr>';
            showToast("Failed to load from Google Sheet", true);
        }
    }

    async function saveToSheet(record) {
        const params = new URLSearchParams();
        params.append("Date", record.date);
        params.append("Time In", record.timeIn);
        params.append("Time Out", record.timeOut);
        params.append("Target", record.target);
        params.append("Cash In", record.cashIn);
        params.append("Balance", record.balance);
        params.append("Comments", record.comments);
        
        try {
            await fetch(SCRIPT_URL, {
                method: "POST",
                mode: "no-cors",
                body: params.toString(),
                headers: { "Content-Type": "application/x-www-form-urlencoded" }
            });
            return true;
        } catch (err) {
            console.error(err);
            return false;
        }
    }

    async function addRecord(recordData) {
        showLoading(true);
        const success = await saveToSheet(recordData);
        showLoading(false);
        
        if (success) {
            showToast("✅ Record saved to Google Sheet!");
            closeModal();
            await loadFromSheet();
        } else {
            showToast("❌ Failed to save", true);
        }
    }

    async function deleteRecordById(id) {
        if (!confirm("Delete this record?")) return;
        
        const remaining = records.filter(r => r.id !== id);
        showLoading(true);
        
        let allSuccess = true;
        for (const record of remaining) {
            const ok = await saveToSheet({
                date: record.date,
                timeIn: record.timeIn,
                timeOut: record.timeOut,
                target: record.target,
                cashIn: record.cashIn,
                balance: record.balance,
                comments: record.comments
            });
            if (!ok) allSuccess = false;
        }
        
        showLoading(false);
        
        if (allSuccess) {
            showToast("✅ Record deleted");
            await loadFromSheet();
        } else {
            showToast("❌ Error deleting", true);
        }
    }

    // ============ RENDER TABLE ============
    function renderTable() {
        const tbody = document.getElementById("tableBody");
        
        if (records.length === 0) {
            tbody.innerHTML = '<tr><td colspan="8" style="text-align:center; padding:40px;">No records. Click + to add</td></tr>';
            return;
        }
        
        const sorted = [...records].sort((a, b) => b.date.localeCompare(a.date));
        
        tbody.innerHTML = sorted.map((rec, idx) => {
            const originalIdx = records.findIndex(r => r.id === rec.id);
            const balanceClass = rec.balance > 0 ? "balance-positive" : rec.balance < 0 ? "balance-negative" : "balance-zero";
            const balanceSign = rec.balance > 0 ? "+" : "";
            
            return `
                <tr onclick="selectRecord(${originalIdx})" id="row-${rec.id}">
                    <td class="checkbox-col" onclick="event.stopPropagation()">
                        <input type="checkbox" class="record-checkbox" data-id="${rec.id}">
                    </td>
                    <td>${rec.date}</td>
                    <td>${rec.timeIn || "—"}</td>
                    <td>${rec.timeOut || "—"}</td>
                    <td>K${rec.target.toFixed(2)}</td>
                    <td>K${rec.cashIn.toFixed(2)}</td>
                    <td class="${balanceClass}">${balanceSign}K${Math.abs(rec.balance).toFixed(2)}</td>
                    <td style="max-width:150px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;" title="${escapeHtml(rec.comments)}">
                        ${rec.comments ? (rec.comments.length > 20 ? rec.comments.substring(0,20) + "..." : rec.comments) : "—"}
                    </td>
                </tr>
            `;
        }).join("");
        
        attachCheckboxEvents();
        updateSelectedCount();
    }

    function selectRecord(index) {
        const record = records[index];
        
        // Show record details in a simple alert (or you can expand this)
        const msg = `📋 RECORD DETAILS\n\nDate: ${record.date}\nTime In: ${record.timeIn || "—"}\nTime Out: ${record.timeOut || "—"}\nTarget: K${record.target.toFixed(2)}\nCash In: K${record.cashIn.toFixed(2)}\nBalance: K${record.balance.toFixed(2)}\nComments: ${record.comments || "—"}`;
        
        if (confirm(msg + "\n\nShare this record?")) {
            shareRecord(record);
        }
    }

    function shareRecord(record) {
        const message = `📊 *CASH TRANSACTION*\n\nDate: ${record.date}\nTime In: ${record.timeIn || "—"}\nTime Out: ${record.timeOut || "—"}\nTarget: K${record.target.toFixed(2)}\nCash In: K${record.cashIn.toFixed(2)}\nBalance: K${record.balance.toFixed(2)}\n${record.comments ? `Notes: ${record.comments}` : ""}`;
        
        const choice = confirm("Share via WhatsApp? (Cancel for SMS)");
        if (choice) {
            window.open(`https://wa.me/${SHARE_NUMBER}?text=${encodeURIComponent(message)}`, "_blank");
        } else {
            window.open(`sms:${SHARE_NUMBER}?body=${encodeURIComponent(message)}`, "_blank");
        }
    }

    // ============ SAVE RECORD (With Balance Submitted) ============
    async function saveRecord() {
        const date = document.getElementById("inputDate").value;
        if (!date) {
            showToast("Please select a date", true);
            return;
        }
        
        // Calculate balance one more time before saving
        const target = parseFloat(document.getElementById("inputTarget").value) || 0;
        const cashIn = parseFloat(document.getElementById("inputCashIn").value) || 0;
        const balance = cashIn - target;
        
        const recordData = {
            date: date,
            timeIn: document.getElementById("inputTimeIn").value || "",
            timeOut: document.getElementById("inputTimeOut").value || "",
            target: target,
            cashIn: cashIn,
            balance: balance,  // BALANCE IS CALCULATED AND SUBMITTED
            comments: document.getElementById("inputComments").value || ""
        };
        
        await addRecord(recordData);
    }

    // ============ SHARE SELECTED ============
    function getSelectedRecords() {
        const checked = document.querySelectorAll(".record-checkbox:checked");
        const ids = Array.from(checked).map(cb => cb.getAttribute("data-id"));
        return records.filter(r => ids.includes(String(r.id)));
    }

    function shareSelectedWhatsApp() {
        const selected = getSelectedRecords();
        if (selected.length === 0) {
            showToast("Select records first", true);
            return;
        }
        
        let message = "📊 *CASHFLOW REPORT*\n\n";
        let totalCash = 0, totalTarget = 0, totalBal = 0;
        
        selected.forEach((r, i) => {
            totalCash += r.cashIn;
            totalTarget += r.target;
            totalBal += r.balance;
            message += `${i+1}. ${r.date} | Cash: K${r.cashIn.toFixed(2)} | Bal: K${r.balance.toFixed(2)}\n`;
            if (r.comments) message += `   📝 ${r.comments}\n`;
        });
        
        message += `\n📊 TOTALS:\n💰 Cash In: K${totalCash.toFixed(2)}\n⚖️ Balance: K${totalBal.toFixed(2)}`;
        
        window.open(`https://wa.me/${SHARE_NUMBER}?text=${encodeURIComponent(message)}`, "_blank");
    }

    function shareSelectedSMS() {
        const selected = getSelectedRecords();
        if (selected.length === 0) {
            showToast("Select records first", true);
            return;
        }
        
        let message = "CASHFLOW REPORT\n\n";
        selected.forEach((r, i) => {
            message += `${i+1}. ${r.date} | Cash: K${r.cashIn.toFixed(2)} | Bal: K${r.balance.toFixed(2)}\n`;
        });
        
        window.open(`sms:${SHARE_NUMBER}?body=${encodeURIComponent(message)}`, "_blank");
    }

    // ============ STATS ============
    function updateStats() {
        let totalCash = 0, totalTarget = 0, totalBal = 0;
        records.forEach(r => {
            totalCash += r.cashIn;
            totalTarget += r.target;
            totalBal += r.balance;
        });
        document.getElementById("totalCashIn").innerHTML = `K${totalCash.toFixed(2)}`;
        document.getElementById("totalTarget").innerHTML = `K${totalTarget.toFixed(2)}`;
        document.getElementById("overallBalance").innerHTML = `K${totalBal.toFixed(2)}`;
    }

    // ============ UI HELPERS ============
    function attachCheckboxEvents() {
        document.querySelectorAll(".record-checkbox").forEach(cb => {
            cb.onchange = () => updateSelectedCount();
        });
        document.getElementById("selectAll").onchange = (e) => {
            document.querySelectorAll(".record-checkbox").forEach(cb => cb.checked = e.target.checked);
            updateSelectedCount();
        };
    }

    function updateSelectedCount() {
        const count = document.querySelectorAll(".record-checkbox:checked").length;
        document.getElementById("selectedCount").innerHTML = `${count} selected`;
    }

    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, m => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[m]));
    }

    function openModal() {
        editingId = null;
        document.getElementById("modalTitle").innerHTML = "<i class='fas fa-plus'></i> Add Record";
        document.getElementById("inputDate").value = new Date().toISOString().slice(0,10);
        document.getElementById("inputTimeIn").value = "";
        document.getElementById("inputTimeOut").value = "";
        document.getElementById("inputTarget").value = 400;
        document.getElementById("inputCashIn").value = "";
        document.getElementById("inputBalance").value = "";
        document.getElementById("inputComments").value = "";
        document.getElementById("modal").classList.add("show");
        document.getElementById("overlay").classList.add("show");
        updateBalance();
    }

    function closeModal() {
        document.getElementById("modal").classList.remove("show");
        document.getElementById("overlay").classList.remove("show");
    }

    // ============ EVENT LISTENERS ============
    document.getElementById("openModalBtn").onclick = openModal;
    document.getElementById("closeModalBtn").onclick = closeModal;
    document.getElementById("cancelBtn").onclick = closeModal;
    document.getElementById("saveBtn").onclick = saveRecord;
    document.getElementById("refreshBtn").onclick = loadFromSheet;
    document.getElementById("whatsappBtn").onclick = shareSelectedWhatsApp;
    document.getElementById("smsBtn").onclick = shareSelectedSMS;
    document.getElementById("overlay").onclick = closeModal;

    // Make functions global for onclick
    window.selectRecord = selectRecord;
