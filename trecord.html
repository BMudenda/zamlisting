<!DOCTYPE html>
<html>
<head>
  <title>Sheet Submit Form</title>
  <style>
    body {
      font-family: Arial;
      background: #eef2f7;
      padding: 20px;
    }

    .box {
      max-width: 450px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.1);
    }

    input, textarea, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      background: #007bff;
      color: white;
      font-weight: bold;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }

    #msg {
      margin-top: 10px;
      text-align: center;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Cash Tracker Entry</h2>

  <form id="myForm">

    <!-- MUST MATCH SHEET HEADERS -->
    <input type="text" name="Time in" placeholder="Time In" required>

    <input type="text" name="Time out" placeholder="Time Out" required>

    <input type="number" name="Cash in Target" placeholder="Cash Target (e.g. 400)" required>

    <input type="number" name="Cash in" placeholder="Cash In" required>

    <input type="text" name="Balance" placeholder="Balance">

    <textarea name="Comments" placeholder="Comments"></textarea>

    <button type="submit">Submit</button>

    <div id="msg"></div>
  </form>
</div>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbz-h296zixkMW-dixCkldzO6WMWZJujwVunSqjPN7E/dev";

const form = document.getElementById("myForm");
const msg = document.getElementById("msg");

form.addEventListener("submit", e => {
  e.preventDefault();

  const formData = new FormData(form);

  fetch(scriptURL, {
    method: "POST",
    body: formData
  })
  .then(res => res.json())
  .then(data => {
    msg.innerHTML = data.result;

    if (data.result.includes("success")) {
      form.reset();
    }
  })
  .catch(err => {
    msg.innerHTML = "Error submitting form";
    console.error(err);
  });
});
</script>

</body>
</html>
