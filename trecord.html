<!DOCTYPE html>
<html>
<head>
  <title>Submit Form</title>
</head>

<body>

<h3>Enter Name</h3>

<input id="first" placeholder="First Name"><br><br>
<input id="last" placeholder="Last Name"><br><br>

<button onclick="send()">Submit</button>

<p id="msg"></p>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbz6QEjxpzIODm7SZ0bq6DXJjnUPhZjY2pst-mYKwsCAfBj__uleIcKXQ_oiyrpoTAM/exec";

function send() {
  const msg = document.getElementById("msg");
  msg.innerText = "Submitting...";

  const first = document.getElementById("first").value;
  const last = document.getElementById("last").value;

  const data = {
    "First Name": first,
    "Last Name": last
  };

  const body = Object.keys(data)
    .map(key => encodeURIComponent(key) + "=" + encodeURIComponent(data[key]))
    .join("&");

  fetch(scriptURL, {
    method: "POST",
    headers: {
      "Content-Type": "application/x-www-form-urlencoded"
    },
    body: body
  })
  .then(res => res.text())
  .then(text => {
    console.log("RAW RESPONSE:", text);

    try {
      const res = JSON.parse(text);

      if (res.result === "success") {
        msg.innerText = "✅ Saved successfully!";
        document.getElementById("first").value = "";
        document.getElementById("last").value = "";
      } else {
        msg.innerText = "❌ Failed";
      }

    } catch (e) {
      msg.innerText = "❌ Response error";
      console.log(e, text);
    }
  })
  .catch(err => {
    msg.innerText = "❌ Network error (request blocked)";
    console.error(err);
  });
}
</script>

</body>
</html>
