<!DOCTYPE html>
<html>
<head>
  <title>Cash Tracker</title>
</head>

<body>

<h2>Cash Entry</h2>

<form id="myForm">

  <input name="Time in" placeholder="Time In" required><br><br>

  <input name="Time out" placeholder="Time Out" required><br><br>

  <input name="Cash in Target" placeholder="Cash Target" required><br><br>

  <input name="Cash in" placeholder="Cash In" required><br><br>

  <input name="Balance" placeholder="Balance"><br><br>

  <input name="Comments" placeholder="Comments"><br><br>

  <button type="submit">Submit</button>

</form>

<p id="msg"></p>

<script>
const scriptURL = "YOUR /exec URL HERE";

document.getElementById("myForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const msg = document.getElementById("msg");
  msg.innerText = "Submitting...";

  try {
    const res = await fetch(scriptURL, {
      method: "POST",
      body: new FormData(e.target)   // 🔥 THIS IS CRITICAL
    });

    const text = await res.text();
    const data = JSON.parse(text);

    if (data.result === "success") {
      msg.innerText = "✅ Saved successfully!";
      e.target.reset();
    } else {
      msg.innerText = "❌ Error: " + data.error;
    }

  } catch (err) {
    msg.innerText = "❌ Network error. Check console.";
    console.error(err);
  }
});
</script>

</body>
</html>
