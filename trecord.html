<!DOCTYPE html>
<html>
<head>
  <title>Simple Submit Form</title>
</head>

<body>

<h3>Enter Your Details</h3>

<form id="form">

  <input type="text" name="First Name" placeholder="First Name" required>
  <br><br>

  <input type="text" name="Last Name" placeholder="Last Name" required>
  <br><br>

  <button type="submit">Submit</button>

</form>

<p id="msg"></p>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbz6QEjxpzIODm7SZ0bq6DXJjnUPhZjY2pst-mYKwsCAfBj__uleIcKXQ_oiyrpoTAM/exec";

const form = document.getElementById("form");
const msg = document.getElementById("msg");

form.addEventListener("submit", function(e) {
  e.preventDefault();

  msg.innerText = "Submitting...";

  fetch(scriptURL, {
    method: "POST",
    body: new FormData(form)
  })
  .then(response => response.json())
  .then(data => {
    if (data.result === "success") {
      msg.innerText = "✅ Submitted successfully!";
      form.reset();
    } else {
      msg.innerText = "❌ Submission failed";
    }
  })
  .catch(() => {
    msg.innerText = "❌ Network error";
  });
});
</script>

</body>
</html>
