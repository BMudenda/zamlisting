<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Cash Tracker Pro - Google Sheet</title>
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            background: white;
            border-radius: 16px;
            padding: 20px 24px;
            margin-bottom: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
        }

        .header h1 {
            font-size: 24px;
            color: #333;
        }

        .header h1 i {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-right: 10px;
        }

        /* 3-Dots Menu Button */
        .menu-container {
            position: relative;
        }

        .menu-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            font-size: 24px;
            cursor: pointer;
            padding: 10px 16px;
            border-radius: 10px;
            transition: all 0.3s;
            color: white;
            margin: 0;
            width: auto;
        }

        .menu-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        /* Dropdown Menu with Form Inside */
        .dropdown-menu {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            border-radius: 20px;
            width: 90%;
            max-width: 700px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: none;
            z-index: 1000;
            animation: modalSlideIn 0.3s ease;
        }

        .dropdown-menu.show {
            display: block;
        }

        @keyframes modalSlideIn {
            from {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        /* Overlay */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            z-index: 999;
        }

        .overlay.show {
            display: block;
        }

        /* Form inside dropdown */
        .form-container {
            padding: 30px;
        }

        .form-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 2px solid #f0f0f0;
        }

        .form-header h2 {
            color: #333;
            font-size: 22px;
        }

        .close-dropdown {
            background: #f0f0f0;
            border: none;
            font-size: 20px;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 8px;
            color: #666;
            transition: all 0.3s;
            margin: 0;
            width: auto;
        }

        .close-dropdown:hover {
            background: #e0e0e0;
            transform: none;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: 600;
            margin-bottom: 8px;
            color: #555;
            font-size: 13px;
        }

        label i {
            margin-right: 6px;
            color: #667eea;
        }

        input, textarea {
            padding: 12px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s;
            font-family: inherit;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        input[readonly] {
            background: #f8f9fa;
            cursor: not-allowed;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .button-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 20px;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        button:active {
            transform: translateY(0);
        }

        .btn-save {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            color: white;
        }

        .btn-refresh {
            background: linear-gradient(135deg, #17a2b8 0%, #0dcaf0 100%);
            color: white;
        }

        .btn-export {
            background: linear-gradient(135deg, #007bff 0%, #0d6efd 100%);
            color: white;
        }

        .btn-clear {
            background: linear-gradient(135deg, #6c757d 0%, #495057 100%);
            color: white;
        }

        /* Main Content Cards */
        .card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        /* Summary Grid */
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-top: 16px;
        }

        .summary-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            transition: transform 0.3s;
            cursor: pointer;
        }

        .summary-box:hover {
            transform: translateY(-5px);
        }

        .summary-box i {
            font-size: 32px;
            margin-bottom: 10px;
            opacity: 0.9;
        }

        .summary-box h3 {
            font-size: 13px;
            margin-bottom: 10px;
            opacity: 0.9;
        }

        .summary-box .value {
            font-size: 28px;
            font-weight: bold;
        }

        /* Table */
        .table-wrapper {
            overflow-x: auto;
            margin-top: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        th {
            background: #343a40;
            color: white;
            padding: 14px 12px;
            text-align: left;
            font-weight: 600;
        }

        th i {
            margin-right: 6px;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #e0e0e0;
        }

        tr:hover {
            background: #f8f9fa;
        }

        /* Status */
        .status {
            padding: 14px;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
            align-items: center;
            gap: 10px;
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1001;
            max-width: 350px;
            animation: slideInRight 0.3s ease;
        }

        @keyframes slideInRight {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            border-left: 4px solid #28a745;
            display: flex;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            border-left: 4px solid #dc3545;
            display: flex;
        }

        .status.info {
            background: #d1ecf1;
            color: #0c5460;
            border-left: 4px solid #17a2b8;
            display: flex;
        }

        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Quick Action Buttons */
        .quick-actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            justify-content: center;
        }

        .quick-btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .quick-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        /* Scrollbar */
        .dropdown-menu::-webkit-scrollbar {
            width: 8px;
        }

        .dropdown-menu::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }

        .dropdown-menu::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 10px;
        }

        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
                gap: 15px;
            }
            
            .button-group button {
                flex: 1;
            }
            
            .summary-box .value {
                font-size: 20px;
            }
            
            .header h1 {
                font-size: 18px;
            }
            
            .quick-actions {
                flex-direction: column;
            }
            
            .status {
                left: 20px;
                right: 20px;
                max-width: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header with 3-dots menu -->
        <div class="header">
            <h1>
                <i class="fas fa-coins"></i> 
                Cash Tracker Pro
            </h1>
            <div class="menu-container">
                <button class="menu-btn" onclick="openFormModal()">
                    <i class="fas fa-plus"></i> <i class="fas fa-ellipsis-v"></i>
                </button>
            </div>
        </div>

        <!-- Overlay -->
        <div id="overlay" class="overlay" onclick="closeFormModal()"></div>

        <!-- Dropdown Menu with Form -->
        <div id="formModal" class="dropdown-menu">
            <div class="form-container">
                <div class="form-header">
                    <h2><i class="fas fa-plus-circle"></i> Add New Record</h2>
                    <button class="close-dropdown" onclick="closeFormModal()">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                
                <form id="cashForm">
                    <div class="form-grid">
                        <div class="form-group">
                            <label><i class="fas fa-calendar-alt"></i> Date *</label>
                            <input type="date" id="date" required>
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-clock"></i> Time In</label>
                            <input type="time" id="timeIn">
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-clock"></i> Time Out</label>
                            <input type="time" id="timeOut">
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-bullseye"></i> Target (K)</label>
                            <input type="number" id="target" value="400" step="100">
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-money-bill-wave"></i> Cash In (K)</label>
                            <input type="number" id="cashIn" step="100">
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-scale-balanced"></i> Balance (K)</label>
                            <input type="number" id="balance" readonly>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label><i class="fas fa-comment"></i> Comments</label>
                        <textarea id="comments" placeholder="Add notes here..."></textarea>
                    </div>
                    
                    <div class="button-group">
                        <button type="submit" class="btn-save">
                            <i class="fas fa-save"></i> Save Record
                        </button>
                        <button type="button" class="btn-clear" onclick="clearForm()">
                            <i class="fas fa-eraser"></i> Clear
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Summary Dashboard -->
        <div class="card">
            <h2><i class="fas fa-chart-line"></i> Summary Dashboard</h2>
            <div class="summary-grid">
                <div class="summary-box" onclick="refreshData()">
                    <i class="fas fa-money-bill-wave"></i>
                    <h3>Total Cash In</h3>
                    <div class="value" id="totalCashIn">K0</div>
                </div>
                <div class="summary-box" onclick="refreshData()">
                    <i class="fas fa-bullseye"></i>
                    <h3>Total Target</h3>
                    <div class="value" id="totalTarget">K0</div>
                </div>
                <div class="summary-box" onclick="refreshData()">
                    <i class="fas fa-scale-balanced"></i>
                    <h3>Overall Balance</h3>
                    <div class="value" id="overallBalance">K0</div>
                </div>
                <div class="summary-box" onclick="refreshData()">
                    <i class="fas fa-database"></i>
                    <h3>Total Records</h3>
                    <div class="value" id="totalRecords">0</div>
                </div>
            </div>
            
            <div class="quick-actions">
                <button class="quick-btn" onclick="refreshData()">
                    <i class="fas fa-sync-alt"></i> Refresh Data
                </button>
                <button class="quick-btn" onclick="exportToCSV()">
                    <i class="fas fa-file-csv"></i> Export CSV
                </button>
                <button class="quick-btn" onclick="shareReport()">
                    <i class="fas fa-share-alt"></i> Share Report
                </button>
                <button class="quick-btn" onclick="window.print()">
                    <i class="fas fa-print"></i> Print
                </button>
            </div>
        </div>

        <!-- Records Table -->
        <div class="card">
            <h2><i class="fas fa-table-list"></i> Cash Records</h2>
            <div class="table-wrapper">
                <table id="dataTable">
                    <thead>
                        <tr>
                            <th><i class="fas fa-calendar"></i> Date</th>
                            <th><i class="fas fa-clock"></i> Time In</th>
                            <th><i class="fas fa-clock"></i> Time Out</th>
                            <th><i class="fas fa-bullseye"></i> Target</th>
                            <th><i class="fas fa-money-bill"></i> Cash In</th>
                            <th><i class="fas fa-scale-balanced"></i> Balance</th>
                            <th><i class="fas fa-comment"></i> Comments</th>
                            <th><i class="fas fa-timestamp"></i> Timestamp</th>
                        </tr>
                    </thead>
                    <tbody id="recordsTable">
                        <tr>
                            <td colspan="8" style="text-align: center;">
                                <i class="fas fa-spinner fa-pulse"></i> Loading from Google Sheet...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="status" class="status"></div>

    <script>
        // Your Google Apps Script URL
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzrsA2UYPyzbRUITAykJa-OntyYI68JXHQuvRPe6QmTxqFYf-OHtAY2d66xG3t-UYY/exec';
        
        let allRecords = [];
        
        // Load data when page loads
        window.addEventListener('DOMContentLoaded', () => {
            loadData();
            
            // Add event listeners for balance calculation
            document.getElementById('cashIn').addEventListener('input', function() {
                updateBalance();
            });
            
            document.getElementById('target').addEventListener('input', function() {
                updateBalance();
            });
        });
        
        // Update balance calculation
        function updateBalance() {
            const target = parseFloat(document.getElementById('target').value) || 0;
            const cashIn = parseFloat(document.getElementById('cashIn').value) || 0;
            const balance = cashIn - target;
            document.getElementById('balance').value = balance.toFixed(2);
        }
        
        // Open form modal
        function openFormModal() {
            document.getElementById('formModal').classList.add('show');
            document.getElementById('overlay').classList.add('show');
        }
        
        // Close form modal
        function closeFormModal() {
            document.getElementById('formModal').classList.remove('show');
            document.getElementById('overlay').classList.remove('show');
        }
        
        // Show status message
        function showStatus(message, type, icon) {
            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML = `<i class="fas ${icon}"></i> ${message}`;
            statusDiv.className = `status ${type}`;
            setTimeout(() => {
                statusDiv.style.display = 'none';
            }, 4000);
        }
        
        // Handle form submission
        document.getElementById('cashForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const date = document.getElementById('date').value;
            if (!date) {
                showStatus('Please select a date', 'error', 'fa-exclamation-triangle');
                return;
            }
            
            // Calculate balance before saving
            updateBalance();
            
            // Prepare data matching your sheet headers
            const formData = new URLSearchParams();
            formData.append('Date', date);
            formData.append('Time In', document.getElementById('timeIn').value);
            formData.append('Time Out', document.getElementById('timeOut').value);
            formData.append('Target', document.getElementById('target').value);
            formData.append('Cash In', document.getElementById('cashIn').value);
            formData.append('Balance', document.getElementById('balance').value);
            formData.append('Comments', document.getElementById('comments').value);
            
            const submitBtn = document.querySelector('#cashForm button[type="submit"]');
            const originalHTML = submitBtn.innerHTML;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Saving...';
            submitBtn.disabled = true;
            
            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: formData.toString()
                });
                
                showStatus('Record saved successfully to Google Sheet!', 'success', 'fa-check-circle');
                clearForm();
                closeFormModal();
                await loadData();
                
            } catch (error) {
                console.error('Error:', error);
                showStatus('Error saving record. Please try again.', 'error', 'fa-times-circle');
            } finally {
                submitBtn.innerHTML = originalHTML;
                submitBtn.disabled = false;
            }
        });
        
        // Load data from Google Sheet
        async function loadData() {
            const tableBody = document.getElementById('recordsTable');
            tableBody.innerHTML = '<tr><td colspan="8" style="text-align: center;"><i class="fas fa-spinner fa-pulse"></i> Loading from Google Sheet...</td></tr>';
            
            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'GET',
                    mode: 'cors'
                });
                
                if (!response.ok) throw new Error('Network response was not ok');
                
                const data = await response.json();
                
                if (data.error) throw new Error(data.error);
                
                // Filter records with Date field
                allRecords = (data.rows || []).filter(row => row.Date && row.Date !== '');
                
                displayRecords();
                updateSummary();
                
                showStatus(`Loaded ${allRecords.length} records from Google Sheet`, 'info', 'fa-info-circle');
                
            } catch (error) {
                console.error('Load error:', error);
                tableBody.innerHTML = '<tr><td colspan="8" style="text-align: center; color: red;"><i class="fas fa-exclamation-circle"></i> Failed to load data</td></tr>';
                showStatus('Failed to load data from Google Sheet', 'error', 'fa-exclamation-triangle');
            }
        }
        
        // Refresh data
        function refreshData() {
            loadData();
        }
        
        // Display records in table
        function displayRecords() {
            const tableBody = document.getElementById('recordsTable');
            
            if (allRecords.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="8" style="text-align: center;"><i class="fas fa-inbox"></i> No records found. Click the + button to add your first record!</td></tr>';
                return;
            }
            
            tableBody.innerHTML = '';
            
            // Sort by date (newest first)
            const sortedRecords = [...allRecords].sort((a, b) => {
                if (!a.Date) return 1;
                if (!b.Date) return -1;
                return b.Date.localeCompare(a.Date);
            });
            
            sortedRecords.forEach(record => {
                const row = tableBody.insertRow();
                row.insertCell(0).textContent = record.Date || '-';
                row.insertCell(1).textContent = record['Time In'] || '-';
                row.insertCell(2).textContent = record['Time Out'] || '-';
                row.insertCell(3).textContent = `K${Number(record.Target || 0).toFixed(2)}`;
                row.insertCell(4).textContent = `K${Number(record['Cash In'] || 0).toFixed(2)}`;
                row.insertCell(5).textContent = `K${Number(record.Balance || 0).toFixed(2)}`;
                row.insertCell(6).textContent = record.Comments || '-';
                row.insertCell(7).textContent = record.Timestamp ? new Date(record.Timestamp).toLocaleString() : '-';
            });
        }
        
        // Update summary dashboard
        function updateSummary() {
            let totalCashIn = 0;
            let totalTarget = 0;
            let totalBalance = 0;
            
            allRecords.forEach(record => {
                totalCashIn += Number(record['Cash In']) || 0;
                totalTarget += Number(record.Target) || 0;
                totalBalance += Number(record.Balance) || 0;
            });
            
            document.getElementById('totalCashIn').textContent = `K${totalCashIn.toFixed(2)}`;
            document.getElementById('totalTarget').textContent = `K${totalTarget.toFixed(2)}`;
            document.getElementById('overallBalance').textContent = `K${totalBalance.toFixed(2)}`;
            document.getElementById('totalRecords').textContent = allRecords.length;
        }
        
        // Clear form
        function clearForm() {
            document.getElementById('date').value = '';
            document.getElementById('timeIn').value = '';
            document.getElementById('timeOut').value = '';
            document.getElementById('target').value = '400';
            document.getElementById('cashIn').value = '';
            document.getElementById('balance').value = '';
            document.getElementById('comments').value = '';
        }
        
        // Export to CSV
        function exportToCSV() {
            if (allRecords.length === 0) {
                showStatus('No records to export', 'error', 'fa-exclamation-triangle');
                return;
            }
            
            let csv = 'Date,Time In,Time Out,Target (K),Cash In (K),Balance (K),Comments,Timestamp\n';
            
            allRecords.forEach(record => {
                csv += `"${record.Date || ''}",`;
                csv += `"${record['Time In'] || ''}",`;
                csv += `"${record['Time Out'] || ''}",`;
                csv += `"${record.Target || 0}",`;
                csv += `"${record['Cash In'] || 0}",`;
                csv += `"${record.Balance || 0}",`;
                csv += `"${record.Comments || ''}",`;
                csv += `"${record.Timestamp || ''}"\n`;
            });
            
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `cash_tracker_${new Date().toISOString().split('T')[0]}.csv`;
            a.click();
            URL.revokeObjectURL(url);
            
            showStatus('CSV exported successfully!', 'success', 'fa-check-circle');
        }
        
        // Share report via WhatsApp
        function shareReport() {
