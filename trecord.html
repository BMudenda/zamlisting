<!DOCTYPE html>
<html>
<head>
  <title>Simple Name Form</title>

  <style>
    body {
      font-family: Arial;
      background: #f4f6f9;
      padding: 30px;
    }

    .box {
      max-width: 400px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 3px 12px rgba(0,0,0,0.1);
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #28a745;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #218838;
    }

    #loader {
      display: none;
      text-align: center;
      margin-top: 10px;
      font-weight: bold;
    }

    #msg {
      text-align: center;
      margin-top: 10px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Submit Name</h2>

  <input type="text" id="firstName" placeholder="First Name">
  <input type="text" id="lastName" placeholder="Last Name">

  <button id="submitBtn">Submit</button>

  <div id="loader">Submitting...</div>
  <p id="msg"></p>
</div>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbz6QEjxpzIODm7SZ0bq6DXJjnUPhZjY2pst-mYKwsCAfBj__uleIcKXQ_oiyrpoTAM/exec";

const firstNameInput = document.getElementById("firstName");
const lastNameInput = document.getElementById("lastName");
const loader = document.getElementById("loader");
const msg = document.getElementById("msg");
const btn = document.getElementById("submitBtn");

function submitForm() {

  const firstName = firstNameInput.value.trim();
  const lastName = lastNameInput.value.trim();

  if (!firstName || !lastName) {
    msg.innerText = "⚠️ Please enter both First Name and Last Name.";
    return;
  }

  loader.style.display = "block";
  msg.innerText = "";

  const data = {
    "First Name": firstName,
    "Last Name": lastName
  };

  const formBody = Object.keys(data)
    .map(k => encodeURIComponent(k) + "=" + encodeURIComponent(data[k]))
    .join("&");

  fetch(scriptURL, {
    method: "POST",
    headers: {
      "Content-Type": "application/x-www-form-urlencoded"
    },
    body: formBody
  })
  .then(r => r.json())
  .then(j => {

    loader.style.display = "none";

    if (
      j.result === "success" ||
      (j.result && j.result.includes("success"))
    ) {
      msg.innerText = "✅ Submitted successfully!";

      firstNameInput.value = "";
      lastNameInput.value = "";
    } else {
      msg.innerText = j.error || "❌ Submission failed";
    }

  })
  .catch(err => {
    loader.style.display = "none";
    msg.innerText = "❌ Network error / submission failed";
    console.error(err);
  });
}

btn.onclick = submitForm;
</script>

</body>
</html>
