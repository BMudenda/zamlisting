<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Panel</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f0f0f5;
      display: flex;
      height: 100vh;
      justify-content: center;
      align-items: center;
    }
    .admin-card {
      background: white;
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 400px;
      text-align: center;
    }
    h2 {
      margin-bottom: 20px;
    }
    input[type="password"] {
      padding: 10px;
      width: 80%;
      margin-bottom: 15px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }
    button {
      padding: 10px 20px;
      background-color: #007bff;
      border: none;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }
    .app-links {
      display: none;
      margin-top: 20px;
    }
    .app-links a {
      display: block;
      margin: 10px 0;
      color: #007bff;
      text-decoration: none;
      font-weight: bold;
    }
    .app-links a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

<div class="admin-card">
  <h2>Admin Login</h2>
  <input type="password" id="adminPass" placeholder="Enter Password" />
  <br />
  <button onclick="checkPassword()">Login</button>

  <div class="app-links" id="appLinks">
    <h3>Access Pages</h3>
    <a href="Luanshya_yangoL.html" target="_blank">Luanshya Platform</a>
    <a href="Luangwa_yangoL_motorcycle.html" target="_blank">Luangwa Motorcycle</a>
    <a href="Luangwa_yangoL.html" target="_blank">Luangwa Platform</a>
    <a href="yangoLcall.html" target="_blank">Admin Dashboard</a>
  </div>
</div>

<script>
  function checkPassword() {
    const input = document.getElementById('adminPass').value;
    const access = document.getElementById('appLinks');
    const password = "admin123"; // Update this to your actual password

    if (input === password) {
      access.style.display = "block";
    } else {
      alert("Incorrect password!");
    }
  }
</script>

</body>
</html>
