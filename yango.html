
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Luanshya- Yango1</title>
  <link rel="stylesheet" href="yango.css">
  
  
</head>
<body>
  <header><h1>Luanshya Taxi Hire</h1></header>
  <div class="container">
    <div class="cart">
      <h2>Taxi Hire Request</h2>
      <input id="start" class="address" placeholder="Where from" />
      <input id="end" class="address" placeholder="Where to" />
      <input id="phone" class="phone-input" placeholder="Enter your phone number" />
      <label for="pickup-time">Start Off Time</label>
      <input id="pickup-time" class="time-input" type="time" placeholder="Pickup time" />
      <label for="passengers">Number of Passengers</label>
      <input id="passengers" class="people-input" type="number" min="1" value="1" />
      <label>
        <input type="checkbox" id="has-luggage" /> I have luggage
      </label>
      <button onclick="estimateFare()">Estimate Fare</button>
      <p id="eta"></p>
      <p id="cart-total"><strong>Estimated Fare:</strong> K0.00</p>
      <button onclick="confirmBooking()">Confirm Booking</button>
      <p id="booking-msg" class="booking-confirmed"></p>
      <p id="active-booking" class="booking-active"></p>
      <button id="cancel-booking" onclick="cancelBooking()" style="display:none; background: red;">Cancel Booking</button>
    </div>
  </div>
  <div id="map"></div>

  <script src="yango.js"></script>

  
  <script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDRdnvGw7epuDJjgBnpv0-FEuSQ6J-fyNY&libraries=places&callback=initMap"></script>
</body>
</html>
